---
# De-quarantine casks the user explicitly trusts. Required because Homebrew 5.0
# removed `--no-quarantine` and macOS 26 Tahoe removed the right-click "Open"
# Gatekeeper bypass. `xattr -rd com.apple.quarantine` is Homebrew's officially
# documented post-install workaround.
#
# Bypasses Gatekeeper Developer-ID / notarisation check and the first-launch
# XProtect scan for the listed apps. Runtime protection (SIP, sandbox, TCC)
# remains active. Only add apps you have personally vetted.
#
# References:
#   https://github.com/orgs/Homebrew/discussions/6537
#   https://brew.sh/2025/11/12/homebrew-5.0.0/

- name: "De-quarantine trusted unsigned casks"
  ansible.builtin.command: >
    /usr/bin/xattr -rd com.apple.quarantine
    "/Applications/{{ item }}.app"
  loop: "{{ devbox_trusted_unsigned_casks }}"
  when: devbox_trusted_unsigned_casks | length > 0
  changed_when: false
  failed_when: false
  tags: [macos, brew, gatekeeper]
