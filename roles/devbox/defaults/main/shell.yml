---
# Fish shell plugins installed via `fisher install`.
# fisher itself is installed via Homebrew; these are managed by fisher.
devbox_fish_plugins:
  - ilancosman/tide
  - ivakyb/fish_ssh_agent
  - jorgebucaran/autopair.fish
  - meaningful-ooo/sponge
  - franciscolourenco/done
  - PatrickF1/fzf.fish
  - jethrokuan/z

# Shell environment and PATH — single source of truth for both fish and bash.
# Templates in conf.d/_init_env.fish.j2, conf.d/_init_path.fish.j2, and .bashrc.j2
# all iterate over these lists, so adding a path here updates both shells.
devbox_shell:
  env:
    - { name: EDITOR, value: nvim }
    - { name: CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC, value: "1" }
    # Protected branches for ~/.claude/bin/pre_bash_safety_gate.py — comma-separated, fnmatch wildcards supported.
    - { name: CC_PROTECTED_BRANCHES, value: "main,master,develop,release/*,release-*" }
    - { name: GOPATH, value: "$HOME/{{ devbox_paths.programming_deps_dir }}/go" }
    - { name: FLUTTER_PATH, value: "$HOME/{{ devbox_paths.programming_deps_dir }}/flutter" }
    - { name: GEM_HOME, value: "$HOME/{{ devbox_paths.programming_deps_dir }}/ruby/gems" }
    # ─── Workspace identity vars (Ancient Greek genitive) ────────────────────
    # Names are intentionally exotic to avoid collision with third-party tools
    # that scan for generic env vars like PROJECTS_DIR or WORKSPACE_ROOT.
    #
    # MNEMOSYNE_PERISTASEOS — Μνημοσύνη περιστάσεως, "Mnemosyne of circumstance".
    #   Mnemosyne is the Greek goddess of memory and mother of the Nine Muses.
    #   Holds the active profile (personal / work) — "who I am and in what
    #   context I am working right now". περίστασις (peristasis) = "that which
    #   stands around" = circumstance, situation, context.
    #
    # AION_AUTOPOIESEON — αἰὼν αὐτοποιήσεων, "Aeon of self-creations" (gen. pl.).
    #   Aiōn is the Hellenistic personification of eternity-as-generative-cycle
    #   (depicted as a youth on the zodiac wheel; Sentinum mosaic, ~200 CE) —
    #   NOT Chronos (linear time) and NOT Kronos (the child-devouring Titan).
    #   αὐτοποίησις (Maturana & Varela, 1972) is the cybernetic term for systems
    #   that produce and maintain themselves by their own rules. The plural
    #   genitive marks cyclicity: many acts, not one. Identifies the workspace
    #   root where ~50 projects live and evolve under the "self-rolling wheel"
    #   principle (Nietzsche's Zarathustra; cf. the warp-and-weft project).
    #
    # PROJECTS_DIR is kept as a transitional alias and will be removed once all
    # long-lived shell sessions have been refreshed.
    - { name: MNEMOSYNE_PERISTASEOS, value: "{{ devbox_active_profile }}" }
    - { name: AION_AUTOPOIESEON, value: "{{ devbox_projects_dir }}" }
    - { name: PROJECTS_DIR, value: "{{ devbox_projects_dir }}" }

  path_prepend:
    - "$HOME/bin"
    - "$HOME/.local/bin"
    - /opt/homebrew/bin

  path_append:
    - "$GOPATH/bin"
    - "$FLUTTER_PATH/bin"
    - "$HOME/.claude/bin"
    - "$GEM_HOME/bin"

  path_conditional:
    - { check: "$HOME/.cargo", add: "$HOME/.cargo/bin" }

# Tide prompt — auto-configure command.
# Generated by: run `tide configure` interactively, press `p` at the end.
# See: https://github.com/IlanCosman/tide/wiki/Syncing-your-tide-config-in-your-dotfiles
devbox_tide_configure_auto: >-
  tide configure --auto
  --style=Rainbow
  --prompt_colors='True color'
  --show_time='24-hour format'
  --rainbow_prompt_separators=Angled
  --powerline_prompt_heads=Sharp
  --powerline_prompt_tails=Flat
  --powerline_prompt_style='One line'
  --prompt_spacing=Compact
  --icons='Many icons'
  --transient=No
