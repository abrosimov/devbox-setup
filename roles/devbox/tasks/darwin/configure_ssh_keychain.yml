---
# Store the SSH key passphrase in the login keychain and register a LaunchAgent
# that loads the key into ssh-agent on every login.
#
# Design: bypasses `ssh-add --apple-use-keychain`. That command needs a TTY /
# SSH_ASKPASS to receive the passphrase; feeding it non-interactively requires
# a temp-file helper. Instead we write the keychain item directly with
# `security add-generic-password` — the resulting item has the exact service
# name (`SSH: <absolute-path>`) that `ssh-add --apple-load-keychain` looks for
# on subsequent logins.
#
# Idempotency: `security add-generic-password -U` (upsert semantics — creates
# on first run, updates on later runs). The LaunchAgent bootstrap step checks
# for prior registration before calling `launchctl bootstrap` (which fails on
# an already-bootstrapped service).
#
# Skipped in dev_mode.
- name: "SSH keychain — resolve absolute key path"
  ansible.builtin.set_fact:
    devbox_ssh_key_path: "{{ ansible_facts['env']['HOME'] }}/.ssh/id_ed25519"
  tags: [ssh, keychain]

- name: "SSH keychain — verify private key exists"
  ansible.builtin.stat:
    path: "{{ devbox_ssh_key_path }}"
  register: devbox_ssh_key_stat
  tags: [ssh, keychain]

- name: "SSH keychain — assert key present (should be generated by prepare_user)"
  ansible.builtin.assert:
    that: devbox_ssh_key_stat.stat.exists
    fail_msg: >-
      Expected SSH key at {{ devbox_ssh_key_path }} but it does not exist.
      prepare_user.yml should have generated it via generate_ssh_key=true.
  tags: [ssh, keychain]

- name: "SSH keychain — check for existing passphrase entry"
  # Idempotency guard: -U on `add-generic-password` has had inconsistent
  # behaviour across macOS releases (Ventura's -U silently no-ops the -T ACL
  # in some cases). An explicit find-first / add-if-missing pattern is
  # portable Monterey→Sequoia. If the passphrase in vault ever changes,
  # `security delete-generic-password -s "SSH: ..."` manually then re-run.
  ansible.builtin.command:
    argv:
      - /usr/bin/security
      - find-generic-password
      - -a
      - "{{ ansible_facts['user_id'] }}"
      - -s
      - "SSH: {{ devbox_ssh_key_path }}"
      - "{{ ansible_facts['env']['HOME'] }}/Library/Keychains/login.keychain-db"
  register: devbox_ssh_keychain_find
  changed_when: false
  failed_when: false
  tags: [ssh, keychain]

- name: "SSH keychain — register passphrase in login keychain"
  # -a: account (macOS username)
  # -s: service name — MUST be `SSH: <absolute-path>` to be found by
  #     `ssh-add --apple-load-keychain` (Apple ssh-add's own format).
  # -w: passphrase (plaintext argv — Ansible child process only, `no_log: true`).
  # -T /usr/bin/ssh-agent / -T /usr/bin/ssh-add: grants those two binaries
  #     silent read access (no ACL prompt when they later read the item).
  # Trailing arg: target keychain (login is default but pin explicitly to
  # avoid a stale iCloud keychain being selected as default).
  ansible.builtin.command:
    argv:
      - /usr/bin/security
      - add-generic-password
      - -a
      - "{{ ansible_facts['user_id'] }}"
      - -s
      - "SSH: {{ devbox_ssh_key_path }}"
      - -w
      - "{{ devbox_user.ssh_pass_phrase }}"
      - -T
      - /usr/bin/ssh-agent
      - -T
      - /usr/bin/ssh-add
      - "{{ ansible_facts['env']['HOME'] }}/Library/Keychains/login.keychain-db"
  when: devbox_ssh_keychain_find.rc != 0
  register: devbox_ssh_keychain_add
  changed_when: devbox_ssh_keychain_add.rc == 0
  no_log: true
  tags: [ssh, keychain]

- name: "SSH keychain — load identity into current ssh-agent"
  # Best-effort: if no ssh-agent is running yet (fresh install, no login-hooked
  # agent socket), this fails harmlessly; the LaunchAgent will handle load at
  # next login.
  ansible.builtin.command: /usr/bin/ssh-add --apple-load-keychain
  register: devbox_ssh_add_load
  changed_when: false
  failed_when: false
  tags: [ssh, keychain]

- name: "SSH keychain — ensure LaunchAgents directory exists"
  ansible.builtin.file:
    path: "{{ ansible_facts['env']['HOME'] }}/Library/LaunchAgents"
    state: directory
    mode: '0755'
  tags: [ssh, keychain, launchagent]

- name: "SSH keychain — deploy LaunchAgent plist"
  ansible.builtin.template:
    src: darwin/Library/LaunchAgents/local.ssh-add-keychain.plist.j2
    dest: "{{ ansible_facts['env']['HOME'] }}/Library/LaunchAgents/local.ssh-add-keychain.plist"
    mode: '0644'
  register: devbox_ssh_launchagent
  tags: [ssh, keychain, launchagent]

- name: "SSH keychain — check LaunchAgent bootstrap status"
  ansible.builtin.command:
    argv:
      - /bin/launchctl
      - print
      - "gui/{{ ansible_facts['user_uid'] }}/local.ssh-add-keychain"
  register: devbox_ssh_launchagent_status
  changed_when: false
  failed_when: false
  tags: [ssh, keychain, launchagent]

- name: "SSH keychain — bootout LaunchAgent (if plist changed)"
  # bootstrap fails on already-loaded services; if we redeployed the plist, we
  # must bootout first to pick up the new definition.
  ansible.builtin.command:
    argv:
      - /bin/launchctl
      - bootout
      - "gui/{{ ansible_facts['user_uid'] }}/local.ssh-add-keychain"
  when:
    - devbox_ssh_launchagent.changed
    - devbox_ssh_launchagent_status.rc == 0
  changed_when: true
  failed_when: false
  tags: [ssh, keychain, launchagent]

- name: "SSH keychain — bootstrap LaunchAgent"
  ansible.builtin.command:
    argv:
      - /bin/launchctl
      - bootstrap
      - "gui/{{ ansible_facts['user_uid'] }}"
      - "{{ ansible_facts['env']['HOME'] }}/Library/LaunchAgents/local.ssh-add-keychain.plist"
  when: >-
    devbox_ssh_launchagent.changed
    or devbox_ssh_launchagent_status.rc != 0
  changed_when: true
  tags: [ssh, keychain, launchagent]
