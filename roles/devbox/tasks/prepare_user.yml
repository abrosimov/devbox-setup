---
- name: Find a shell path
  ansible.builtin.command: "command -v fish"
  register: devbox_shell_path
  changed_when: false
  check_mode: false
  failed_when: devbox_shell_path.rc != 0

- name: Fail early if shell not found
  ansible.builtin.assert:
    that:
      - devbox_shell_path.stdout | length > 0
    fail_msg: "Shell not found in PATH even after installation!"

- name: Update user
  become: true
  ansible.builtin.user:
    name: "{{ devbox_user.login }}"
    comment: Kirill Abrosimov
    shell: "{{ devbox_shell_path.stdout }}"
    create_home: false
    update_password: on_create
    generate_ssh_key: true
    ssh_key_type: "ed25519"
    ssh_key_passphrase: "{{ devbox_user.ssh_pass_phrase }}"
  register: devbox_user_result
  # NOTE: devbox_user_result feeds the re-login gate in main.yml. Fresh machines
  # default to bash/zsh; switching the login shell to fish only takes effect in
  # a new login session. On a converged machine the module reports ok.
