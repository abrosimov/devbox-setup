- name: Default playbook for basic system setup
  hosts: 127.0.0.1
  connection: local

  # Sudo password flows from the macOS login keychain slot `devbox-sudo` via
  # `become_password_file = scripts/keychain-become-pass.sh` (see ansible.cfg
  # [privilege_escalation]). The same slot is exposed to task templates as
  # `devbox_sudo_password` in roles/devbox/defaults/main/core.yml — required by
  # `community.general.homebrew_cask.sudo_password:` for pkg-based casks
  # (karabiner-elements, docker-desktop, ...) to install non-interactively.
  # Seed on first run happens via scripts/ensure_secrets.sh, invoked as a
  # Makefile prereq of `run`. Rotate via `make sudo-reseed`.

  # Touch ID for sudo (pam_tid.so) pops a UI dialog before sudo reads its
  # stdin password. The dialog has a ~60s timeout, so Ansible's default
  # become timeout of 10s fails AFK runs with "Timed out waiting for become
  # success or become password prompt". 120s lets the dialog expire and
  # fall through to password auth.
  vars:
    ansible_become_timeout: 120

  roles:
    - devbox
