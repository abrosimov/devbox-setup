      - implementation_planner
      - domain_modeller
      - technical_product_manager
      - api_designer
  build_resolver_go:
    problem: "Go compilation failures get patched at the symptom without classifying module, import-cycle, or CGO root causes."
    related:
      - software_engineer_go
  code_reviewer:
    problem: "Reviews miss cross-language issues that engineers and test writers overlooked, especially in polyglot diffs."
    related:
      - software_engineer_go
      - software_engineer_python
      - software_engineer_frontend
      - unit_tests_writer
      - meta_reviewer
  consistency_checker:
