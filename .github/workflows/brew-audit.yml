name: brew-audit

# Periodic supply-chain audit of the Homebrew package set managed by this repo.
# Uses Homebrew/brew-vulns (official Homebrew subcommand, queries OSV.dev) to
# scan the package set declared in roles/devbox/defaults/main/packages.yml plus
# the personal profile extras. SARIF output is uploaded to GitHub code scanning
# so findings surface in the Security tab.
#
# Why a separate workflow from ci.yml: needs macOS runner (Homebrew) + writes to
# security-events. ci.yml is Ubuntu and read-only.

on:
  schedule:
    # Weekly, Monday 06:00 UTC. Random offset would be ideal but GH Actions
    # cron is on the minute — no jitter built in.
    - cron: "0 6 * * 1"
  workflow_dispatch:
  pull_request:
    paths:
      - "roles/devbox/defaults/main/packages.yml"
      - "profiles/*.yml"
      - ".github/workflows/brew-audit.yml"
      - "Makefile"

permissions:
  contents: read
  security-events: write

concurrency:
  group: brew-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  brew-vulns:
    name: Brew CVE scan (OSV via brew-vulns)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install brew-vulns
        run: brew install Homebrew/brew-vulns/brew-vulns

      - name: Generate Brewfile from repo declarations
        run: |
          make audit-brewfile > Brewfile.audit
          echo "--- Brewfile.audit ---"
          cat Brewfile.audit

      - name: Run brew vulns (SARIF output)
        run: |
          # `|| true` because brew-vulns exits non-zero on findings; we still
          # want the SARIF upload step to run so findings surface in the UI.
          brew vulns --brewfile Brewfile.audit --sarif > brew-vulns.sarif || true
          # Empty file would make the upload step error — fall back to a
          # minimal valid SARIF skeleton so the workflow stays green when
          # nothing was found.
          if [ ! -s brew-vulns.sarif ]; then
            cat > brew-vulns.sarif <<'EOF'
          {"version":"2.1.0","$schema":"https://json.schemastore.org/sarif-2.1.0.json","runs":[{"tool":{"driver":{"name":"brew-vulns","informationUri":"https://github.com/Homebrew/brew-vulns"}},"results":[]}]}
          EOF
          fi

      - name: Upload SARIF to GitHub code scanning
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          sarif_file: brew-vulns.sarif
          category: brew-vulns
        continue-on-error: true   # Skip silently if code scanning is not enabled

      - name: Print high-severity summary (job log)
        run: brew vulns --brewfile Brewfile.audit --severity high || true
