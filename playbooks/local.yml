---
# Fast-path: deploy the gitignored local overlay (roles/devbox/local/).
# Reuses Block 6 of roles/devbox/tasks/install_configs.yml under the `local` tag.
#
# No sudo, no vault. Invoked via `make local-push`.

- name: Deploy local overlay
  hosts: 127.0.0.1
  connection: local
  gather_facts: false

  vars_files:
    - "../roles/devbox/defaults/main/core.yml"

  tasks:
    - name: Apply local overlay tasks
      ansible.builtin.import_tasks: "../roles/devbox/tasks/install_configs.yml"
      vars:
        role_path: "{{ playbook_dir }}/../roles/devbox"
