---
# `become` is conditional on devbox_skip_become so slim maintenance playbooks
# (make shell-push, make mcp-sync) can opt out of the sudo prompt. The full
# main.yml playbook leaves the default in place, preserving the existing
# defensive `become_user: <login user>` behaviour.

- name: Find fish shell path
  ansible.builtin.command: "command -v fish"
  register: devbox_fish_shell_path
  changed_when: false
  check_mode: false
  failed_when: devbox_fish_shell_path.rc != 0
  tags: [configs, shell]

- name: Find fc-cache path
  ansible.builtin.command: "command -v fc-cache"
  register: devbox_fc_cache_path
  changed_when: false
  check_mode: false
  failed_when: false
  tags: [configs, shell]

- name: Regenerate font cache for user directories
  ansible.builtin.command: >-
    {{ devbox_fc_cache_path.stdout }} -f
    {{ ansible_facts['env']['HOME'] }}/Library/Fonts
    {{ ansible_facts['env']['HOME'] }}/.local/share/fonts
  become: "{{ not (devbox_skip_become | default(false)) }}"
  become_user: "{{ devbox_user.login }}"
  when: devbox_fc_cache_path.rc == 0
  changed_when: false
  failed_when: false
  tags: [configs, shell]

- name: "Migration: remove pinned tide@v6 before unpinned install"
  ansible.builtin.shell: "{{ devbox_fish_shell_path.stdout }} -c 'fisher remove ilancosman/tide@v6'"
  args:
    executable: /bin/bash
  become: "{{ not (devbox_skip_become | default(false)) }}"
  become_user: "{{ devbox_user.login }}"
  changed_when: false
  failed_when: false
  tags: [configs, shell]

- name: Install fisher plugins
  ansible.builtin.shell: "{{ devbox_fish_shell_path.stdout }} -c 'fisher install {{ item }}'"
  args:
    executable: /bin/bash
  loop: "{{ devbox_fish_plugins }}"
  become: "{{ not (devbox_skip_become | default(false)) }}"
  become_user: "{{ devbox_user.login }}"
  changed_when: false
  tags: [configs, shell]

- name: Update fisher plugins
  ansible.builtin.shell: "{{ devbox_fish_shell_path.stdout }} -c 'fisher update'"
  args:
    executable: /bin/bash
  become: "{{ not (devbox_skip_become | default(false)) }}"
  become_user: "{{ devbox_user.login }}"
  changed_when: false
  tags: [configs, shell]

- name: Configure tide prompt (auto mode)
  ansible.builtin.shell: "{{ devbox_fish_shell_path.stdout }} -c '{{ devbox_tide_configure_auto }}'"
  args:
    executable: /bin/bash
  become: "{{ not (devbox_skip_become | default(false)) }}"
  become_user: "{{ devbox_user.login }}"
  changed_when: false
  tags: [configs, shell]

# --- macOS GUI-tool launchd services ---

# JankyBorders runs as a per-user launchd service (state=present == started,
# idempotent). AeroSpace has start-at-login=false and no after-startup-command,
# so borders is brought up independently here rather than by the WM. Darwin-only:
# apply_configs.yml is shared with the Linux path, where there is no brew/borders.
- name: Start JankyBorders as a launchd service
  community.general.homebrew_services:
    name: borders
    state: present
  environment:
    PATH: "/opt/homebrew/bin:{{ ansible_facts['env']['PATH'] }}"
  when: ansible_facts['os_family'] == "Darwin"
  tags: [configs, macos]

# --- MCP servers data directories ---

- name: Create MCP memory data directory
  ansible.builtin.file:
    path: "{{ devbox_paths.dotfiles_root_dir }}/.claude/memory"
    state: directory
    mode: "0755"
  become: "{{ not (devbox_skip_become | default(false)) }}"
  become_user: "{{ devbox_user.login }}"
  tags: [configs, mcp]

# --- Claude Code MCP servers ---
# Registered via `claude mcp add --scope user` → writes to ~/.claude.json.
# settings.json is for permissions/sandbox only, not MCP servers.

- name: Find Claude Code CLI path
  ansible.builtin.command: "command -v claude"
  register: devbox_claude_cli_path
  changed_when: false
  check_mode: false
  failed_when: false
  tags: [configs, claude, mcp]

- name: Add Claude Code plugin marketplaces
  ansible.builtin.command: >
    {{ devbox_claude_cli_path.stdout }} plugin marketplace add {{ item.repo }}
  loop: "{{ devbox_claude_plugin_marketplaces }}"
  loop_control:
    label: "{{ item.name }}"
  become: "{{ not (devbox_skip_become | default(false)) }}"
  become_user: "{{ devbox_user.login }}"
  when: devbox_claude_cli_path.rc == 0
  changed_when: false
  failed_when: false
  tags: [configs, claude]

- name: Install Claude Code plugins (user scope)
  ansible.builtin.command: >
    {{ devbox_claude_cli_path.stdout }} plugin install
    {% if item.marketplace is defined %}{{ item.name }}@{{ item.marketplace }}{% else %}{{ item.name }}{% endif %}
    --scope user
  loop: "{{ devbox_claude_plugins }}"
  loop_control:
    label: "{{ item.name }}"
  become: "{{ not (devbox_skip_become | default(false)) }}"
  become_user: "{{ devbox_user.login }}"
  when: devbox_claude_cli_path.rc == 0
  changed_when: false
  failed_when: false
  tags: [configs, claude]

- name: Enable Claude Code plugins (user scope)
  ansible.builtin.command: >
    {{ devbox_claude_cli_path.stdout }} plugin enable {{ item.name }} --scope user
  loop: "{{ devbox_claude_plugins }}"
  loop_control:
    label: "{{ item.name }}"
  become: "{{ not (devbox_skip_become | default(false)) }}"
  become_user: "{{ devbox_user.login }}"
  when: devbox_claude_cli_path.rc == 0
  changed_when: false
  failed_when: false
  tags: [configs, claude]

- name: Register Claude Code MCP servers - Docker (user scope)
  ansible.builtin.command: >
    {{ devbox_claude_cli_path.stdout }} mcp add
    --transport stdio
    --scope user
    {{ item.name }}
    -- docker run --rm -i
    {% if item.network is defined %}--network={{ item.network }}{% endif %}
    {% if item.read_only | default(false) %}--read-only{% endif %}
    {% if item.init | default(false) %}--init{% endif %}
    {% for k, v in (item.env | default({})).items() %}-e {{ k }}={{ v }} {% endfor %}
    {{ item.image }}
  loop: "{{ devbox_mcp_docker_servers }}"
  become: "{{ not (devbox_skip_become | default(false)) }}"
  become_user: "{{ devbox_user.login }}"
  when: devbox_claude_cli_path.rc == 0
  changed_when: false
  failed_when: false
  tags: [configs, claude, mcp]

- name: Register Claude Code MCP servers - Script (user scope)
  ansible.builtin.command: >
    {{ devbox_claude_cli_path.stdout }} mcp add
    --transport stdio
    --scope user
    {{ item.name }}
    -- {{ item.command }}
  loop: "{{ devbox_mcp_script_servers }}"
  become: "{{ not (devbox_skip_become | default(false)) }}"
  become_user: "{{ devbox_user.login }}"
  when: devbox_claude_cli_path.rc == 0
  changed_when: false
  failed_when: false
  tags: [configs, claude, mcp]

- name: Register Claude Code MCP servers - HTTP (user scope)
  ansible.builtin.command: >
    {{ devbox_claude_cli_path.stdout }} mcp add
    --transport {{ item.transport | default('http') }}
    --scope user
    {{ item.name }}
    {{ item.url }}
  loop: "{{ devbox_mcp_http_servers + devbox_extra_mcp_http_servers }}"
  become: "{{ not (devbox_skip_become | default(false)) }}"
  become_user: "{{ devbox_user.login }}"
  when: devbox_claude_cli_path.rc == 0
  changed_when: false
  failed_when: false
  tags: [configs, claude, mcp]

# Reconciler: anything registered at user scope that is NOT in the declared
# union above gets removed. Makes defaults/main/claude.yml the single source
# of truth for MCP servers — drop an entry from the YAML and the next
# `make claude-push` (or full playbook) will deregister it.
#
# `claude mcp list` prints `<name>: <command-or-url> - <status>` per line
# plus a header. Names may contain spaces and dots (e.g. "claude.ai Gmail"),
# so we match everything up to the first `:`. Servers prefixed with
# "claude.ai " are auto-registered by Claude Code itself (Anthropic-managed
# Gmail/Drive/Calendar integrations) — they get re-added automatically, so
# removing them would just churn. The reject() filter excludes them.
- name: List currently registered MCP servers (user scope)
  ansible.builtin.command: "{{ devbox_claude_cli_path.stdout }} mcp list"
  register: devbox_mcp_current_raw
  become: "{{ not (devbox_skip_become | default(false)) }}"
  become_user: "{{ devbox_user.login }}"
  when: devbox_claude_cli_path.rc == 0
  changed_when: false
  check_mode: false
  failed_when: false
  tags: [configs, claude, mcp]

- name: Compute MCP reconciler diff (registered - declared - auto-managed)
  ansible.builtin.set_fact:
    devbox_mcp_to_remove: >-
      {{ (devbox_mcp_current_raw.stdout_lines | default([])
          | select('match', '^[^:]+:\s')
          | map('regex_replace', '^([^:]+?):\s.*$', '\1')
          | reject('match', '^claude\.ai ')
          | list)
         | difference(
             (devbox_mcp_docker_servers
              + devbox_mcp_script_servers
              + devbox_mcp_http_servers
              + devbox_extra_mcp_http_servers)
             | map(attribute='name') | list) }}
  when: devbox_claude_cli_path.rc == 0
  tags: [configs, claude, mcp]

- name: Remove undeclared MCP servers (user scope)
  ansible.builtin.command: >
    {{ devbox_claude_cli_path.stdout }} mcp remove {{ item }} --scope user
  loop: "{{ devbox_mcp_to_remove | default([]) }}"
  become: "{{ not (devbox_skip_become | default(false)) }}"
  become_user: "{{ devbox_user.login }}"
  when:
    - devbox_claude_cli_path.rc == 0
    - devbox_mcp_to_remove | default([]) | length > 0
  changed_when: true
  failed_when: false
  tags: [configs, claude, mcp]
