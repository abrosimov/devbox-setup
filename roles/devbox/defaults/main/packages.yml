---
# =============================================================================
# Homebrew taps (third-party repositories)
# =============================================================================

# Tapped before any secondary install. Trust is granted in the playbook to
# every non-official tap currently present on the machine (sweep over
# `brew tap`), so adding an entry here also marks intent — `make audit-taps`
# flags any third-party tap that is on the machine but missing from this list.
devbox_brew_taps:
  - nikitabobko/tap        # aerospace tiling WM
  - FelixKratz/formulae    # sketchybar, borders (JankyBorders)
  - grafana/grafana        # gcx + Grafana CLIs
  - bufbuild/buf           # `buf` Protobuf CLI (no longer in homebrew-core)
  - goreleaser/tap         # goreleaser, nfpm, chglog — release automation
  - ktr0731/evans          # evans gRPC REPL (upstream frozen since 2023, kept for the REPL UX)

# =============================================================================
# Homebrew formulae and casks
# =============================================================================

# Primary: core packages installed first (no dependencies on secondary).
devbox_brew_primary:
  - kitty
  - fish
  - fisher
  - bat
  - podman
  - mas
  - wget
  - curl
  - htop
  - nvim
  - telnet
  - eza
  - terminal-notifier

devbox_brew_primary_special:
  # fontconfig needs ignore-warnings handling in the task file.
  - fontconfig

devbox_brew_primary_casks:
  - ghostty
  - font-fira-code
  - font-ia-writer-duo
  - font-ia-writer-mono
  - font-ia-writer-quattro
  - font-meslo-for-powerlevel10k
  - font-meslo-for-powerline
  - font-meslo-lg
  - font-meslo-lg-dz
  - font-meslo-lg-nerd-font

# Secondary: packages that depend on primary (languages, dev tools, etc.).
devbox_brew_secondary:
  - opam
  - erlang
  - rustup
  - flutter
  - go
  - go-task
  - node
  - uv
  - helm
  - tree-sitter-cli
  # orbstack moved to profile overrides (work uses orbstack, personal uses docker-desktop).
  - k9s
  - fzf
  - tmux
  - mise
  - fnm             # Fast Node Manager — auto-switches Node version on cd
  - golangci-lint
  - luarocks       # Needed by lazy.nvim
  - go-jsonnet
  - jsonnet-bundler
  - gh             # GitHub CLI — needed by Claude Code PR workflow
  - glab           # GitLab CLI — mirrors gh for GitLab workflows
  - goreleaser     # Go release automation (binaries, archives, brew tap, signed releases)
  - jq             # JSON processor — used by scripts and agents
  - ripgrep        # Fast grep — fallback for Claude Code Grep tool
  - fd             # Fast find — used by Claude Code Glob tool
  - tree           # Directory tree — used by agents for codebase exploration
  - cloc           # Count lines of code by language
  - yq             # YAML/JSON/XML processor (like jq for YAML)
  - hadolint       # Dockerfile linter — used by post_edit_lint.py
  - swi-prolog     # Prolog runtime — includes built-in LSP support
  - swift-format   # Apple's official Swift code formatter
  - cmake          # C/C++ build system
  - bazelisk       # Bazel version manager (installs as `bazel`)
  - buf            # Protobuf toolchain — LSP (buf_ls), formatter, linter
  - grpcurl        # curl-for-gRPC — scripted/CI calls, mTLS, reflection
  - evans          # gRPC REPL with autocompletion — interactive exploration of unknown APIs
  - stylua         # Lua code formatter
  - shfmt          # Shell/Bash code formatter
  - clang-format   # C/C++ code formatter
  - ast-grep       # Structural AST code search — used by Claude Code ast-grep skill
  - codex           # OpenAI Codex CLI
  - lima            # Linux VM (eBPF/bpftrace sandbox, perf-style observability)
  - sketchybar      # Status bar replacement (FelixKratz/formulae tap)
  - borders         # JankyBorders — focused-window outline (FelixKratz/formulae tap)
  - gost            # GO Simple Tunnel — HTTP-to-SOCKS bridge used by `pub` mode
  - grafana/grafana/gcx  # Grafana CLI — PromQL/LogQL/Tempo queries via Grafana datasources

devbox_brew_secondary_casks:
  - codex-app
  - obsidian
  - goland
  - webstorm
  - intellij-idea
  - pycharm
  - ghostty
  - claude
  - chatgpt
  - freelens
  - zen
  # Window management / awesome-wm-on-mac stack (configured separately).
  - nikitabobko/tap/aerospace  # i3-like tiling window manager (no SIP off)
  - alt-tab                    # Window-level Alt-Tab (vs default app-level Cmd-Tab)
  - raycast                    # App launcher with script-commands (rofi replacement)
  - hammerspoon                # Lua scripting bridge to macOS (cursor/window/USB events)
  - karabiner-elements         # Key remap for built-in laptop kb (Kinesis has its own ZMK)
  - betterdisplay              # HiDPI for external monitors (replaces one-key-hidpi note)

# Secondary casks installed with `--no-binaries` (mirrors the docker-desktop
# pattern). Required for pkg-based casks whose installer writes root-owned
# files inside /Applications/<App>.app; brew's post-install `xattr -w` step
# runs as the user and fails. Shared across profiles; concatenated with
# `devbox_extra_brew_casks_no_binaries` from profile overrides at install time.
devbox_brew_secondary_casks_no_binaries:
  - cloudflare-warp            # WARP VPN; .pkg ships /usr/local/bin/warp-cli directly

# npm packages (installed globally via node from secondary).
devbox_npm_packages:
  - dclint         # Docker Compose linter
  - typescript-language-server  # TypeScript LSP — used by Claude Code typescript-lsp plugin

# Mac App Store apps (currently empty — kept for structure).
devbox_appstore_apps: []

# =============================================================================
# Language-specific tools (installed via native package managers)
# =============================================================================

devbox_packages:
  # Go tools installed via `go install`. Each entry has:
  #   pkg: full package path with version (usually @latest)
  #   bin: binary name (for idempotency check)
  go_tools:
    - { pkg: "golang.org/x/tools/cmd/goimports@latest", bin: "goimports" }
    - { pkg: "github.com/vektra/mockery/v2@latest", bin: "mockery" }
    - { pkg: "github.com/sqlc-dev/sqlc/cmd/sqlc@latest", bin: "sqlc" }
    - { pkg: "golang.org/x/tools/gopls@latest", bin: "gopls" }
    - { pkg: "github.com/go-delve/delve/cmd/dlv@latest", bin: "dlv" }

  # kubectl — direct binary download (pinned version)
  kubectl:
    version: "1.32.5"

  # Python tools installed via `uv tool install`.
  # Binary name matches tool name.
  uv_tools:
    - ruff
    - mypy
    - ansible-lint
    - debugpy
    - keyring
    - pyrefly
    - pylint
    - sqlfluff
