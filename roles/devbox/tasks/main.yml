---
- name: Override dotfiles_root_dir if dev_mode is enabled
  ansible.builtin.set_fact:
    devbox_paths: "{{ devbox_paths | combine({'dotfiles_root_dir': dev_dotfiles_path_override}) }}"
  when: dev_mode | default(false) | bool
  vars:
    dev_dotfiles_path_override: ".devbox/debug/dotfiles"

- name: "Sanitize ~/.gitconfig (migrate legacy keys to managed schema)"
  ansible.builtin.include_tasks: sanitize_gitconfig.yml
  when: not (dev_mode | default(false) | bool)
  tags: [git, sanitize]

- name: "Install necessary homebrew packages for MacOS"
  ansible.builtin.include_tasks: main_darwin.yml
  when: ansible_facts['os_family'] == "Darwin"
- name: "Install necessary homebrew packages for Linux"
  ansible.builtin.include_tasks: main_linux.yml
  when: ansible_facts['os_family'] == "Linux"
# Re-login policy: nothing here needs a reboot. Touch ID, pmset, DevToolsSecurity,
# hidutil Caps Lock LaunchAgent and Night Shift apply immediately;
# Dock/Finder/ControlCenter defaults via killall handlers. A fresh login SESSION
# is required for: login-cached NSGlobalDomain keyboard keys (KeyRepeat /
# InitialKeyRepeat), login-shell switch to fish, and AppleSymbolicHotKeys
# (CoreServices binds at loginwindow — cfprefsd flush alone is not enough).
- name: "Re-login hint (only when a login-cached setting changed)"
  ansible.builtin.debug:
    msg: >-
      Keyboard, login-shell, or Spotlight-hotkey settings changed. Log out
      and back in (or open a new terminal / relaunch affected apps) to apply
      them. No reboot needed.
  when: >-
    ((devbox_macos_defaults_result.results | default([]))
     | selectattr('changed', 'defined') | selectattr('changed')
     | map(attribute='item.key')
     | select('in', ['KeyRepeat', 'InitialKeyRepeat'])
     | list | length > 0)
    or (devbox_user_result.changed | default(false))
    or (devbox_sh_cmd_space_write.changed | default(false))
    or (devbox_sh_cmd_opt_space_write.changed | default(false))
