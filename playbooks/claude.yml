---
# Fast-path playbook for deploying just the Claude Code config.
#
# Reuses the canonical Block 1 + Block 2 tasks from
# roles/devbox/tasks/install_configs.yml under the `claude` tag — so this and
# `make personal` / `make work` share a single implementation.
#
# No sudo prompt: none of the claude tasks use `become`.
# No vault load:  none of the claude tasks reference `vault_*` vars.
# No facts:       `~` expansion in `file:` and `synchronize:` works without them.
#
# Invoked via `make claude-push`. Runs in ~3-5s.

- name: Deploy Claude Code config
  hosts: 127.0.0.1
  connection: local
  gather_facts: false

  vars_files:
    - "../roles/devbox/defaults/main/core.yml"
    - "../roles/devbox/defaults/main/claude.yml"

  tasks:
    - name: Deploy Claude Code managed subdirs and root files
      ansible.builtin.import_tasks: "../roles/devbox/tasks/install_configs.yml"
      vars:
        # role_path is normally injected by the `roles:` loop. Set it explicitly
        # here so the synchronize task's `src:` resolves correctly.
        role_path: "{{ playbook_dir }}/../roles/devbox"
