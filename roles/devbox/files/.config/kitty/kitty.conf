# vim:fileencoding=utf-8:foldmethod=marker

#: Fonts {{{

font_family      MesloLGS Nerd Font Mono
font_size 18.0
force_ltr no
disable_ligatures always

#: }}}

#: Cursor {{{

cursor_shape block
cursor_beam_thickness 1
cursor_blink_interval 0

#: }}}

#: Scrollback {{{

scrollback_lines 50000
scrollback_pager_history_size 8
scrollback_pager bat --paging=always --style=plain --wrap=never

#: }}}

#: Copy / Paste {{{

copy_on_select clipboard

#: }}}

#: Tab bar {{{

tab_bar_edge top
tab_bar_style separator
tab_separator "|"
tab_bar_align center
tab_switch_strategy previous
tab_activity_symbol "*"
tab_title_template "{fmt.fg.red}{bell_symbol}{activity_symbol}{fmt.fg.tab}{index}: {title}"

#: }}}

#: Layouts {{{

enabled_layouts splits,stack

#: }}}

#: Shell integration {{{

shell_integration no-cursor
# Built-in keybindings (for reference):
#   ctrl+shift+z  — jump to previous prompt
#   ctrl+shift+x  — jump to next prompt
#   ctrl+shift+g  — view last command output in pager
#   ctrl+shift+h  — view full scrollback in pager

#: }}}

#: macOS {{{

macos_colorspace srgb
macos_option_as_alt yes

#: }}}

#: Misc {{{

confirm_os_window_close 0
allow_remote_control yes

#: }}}

#: Keybindings — Splits {{{
#: Using native key codes (0x##) for layout-independent mapping (works with Russian layout)

map cmd+0x02 launch --location=vsplit --cwd=current
map cmd+shift+0x02 launch --location=hsplit --cwd=current
map cmd+opt+left neighboring_window left
map cmd+opt+right neighboring_window right
map cmd+opt+up neighboring_window up
map cmd+opt+down neighboring_window down
map cmd+shift+0x24 toggle_layout stack

#: }}}

#: Keybindings — Tabs {{{

map cmd+0x11 launch --type=tab
map cmd+shift+0x11 launch --type=tab --cwd=current
map cmd+0x0D close_window
map cmd+1 goto_tab 1
map cmd+2 goto_tab 2
map cmd+3 goto_tab 3
map cmd+4 goto_tab 4
map cmd+5 goto_tab 5
map cmd+6 goto_tab 6
map cmd+7 goto_tab 7
map cmd+8 goto_tab 8
map cmd+9 goto_tab 9

#: }}}

#: Keybindings — Font size {{{

map cmd+equal change_font_size all +1.0
map cmd+minus change_font_size all -1.0
map cmd+0 change_font_size all 0

#: }}}

#: Keybindings — Hints {{{

map ctrl+shift+0x0E kitten hints
map cmd+shift+0x23 kitten hints --type path --program @
map cmd+shift+0x05 kitten hints --type linenum
map cmd+shift+0x04 kitten hints --type hash --program -

#: }}}

#: Keybindings — File picker {{{

map cmd+shift+0x1F kitten choose_files

#: }}}

include current-theme.conf
