---
devbox_upgrade_mode: false

# Secrets flow: both `devbox_user.ssh_pass_phrase` and `devbox_sudo_password`
# are read from macOS login keychain slots (`devbox-ssh-passphrase` and
# `devbox-sudo`, seeded by scripts/ensure_secrets.sh). The `_override` hooks
# are for dev_mode / test runs — `make check-dev` sets them via `-e`. When the
# slot is missing the lookup falls back to the literal string `MISSING`, which
# an assert task in main_darwin.yml catches before any consumer runs.
devbox_user:
  login: kabrosimov
  ssh_pass_phrase: >-
    {{ devbox_ssh_pass_phrase_override |
       default(lookup('pipe',
         'security find-generic-password -w -a ' ~ lookup('env', 'USER') ~
         ' -s devbox-ssh-passphrase 2>/dev/null || echo MISSING'), true) }}

devbox_sudo_password: >-
  {{ devbox_sudo_password_override |
     default(lookup('pipe',
       'security find-generic-password -w -a ' ~ lookup('env', 'USER') ~
       ' -s devbox-sudo 2>/dev/null || echo MISSING'), true) }}

devbox_paths:
  dotfiles_root_dir: "~"
  programming_deps_dir: ".programming"

devbox_projects_dir: "$HOME/Projects"

# Active profile name, overridden in profiles/{personal,work}.yml.
# Rendered into the MNEMOSYNE_PERISTASEOS env var (see devbox_shell.env in
# shell.yml). Slim playbooks (dotfiles-push, shell-push, mcp-sync) read that
# env var via Makefile ACTIVE_PROFILE to recover the active profile without
# re-running the full personal/work playbook.
devbox_active_profile: "unknown"

# Profile extension points — overridden in profiles/*.yml.
# Lists are concatenated with base lists in task files via `+`.
devbox_extra_brew: []
devbox_extra_brew_casks: []
# Casks installed with `--no-binaries` to skip brew's CLI shim + Spotlight
# metadata steps. Required for casks like `docker-desktop` whose .pkg installer
# writes root-owned files into the .app bundle, after which brew's post-install
# `xattr -w` (run as the user) fails with "Operation not permitted". The
# affected CLIs (e.g. docker, docker-compose) are linked by the vendor's own
# installer into /usr/local/bin, so the user-facing surface is unchanged.
devbox_extra_brew_casks_no_binaries: []
devbox_extra_mcp_http_servers: []
