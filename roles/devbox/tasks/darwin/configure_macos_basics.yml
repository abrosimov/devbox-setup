---
# Codifies the manual steps from kabrosimov_notes/MacOS/*.md so a fresh install
# converges to the expected state via `make personal` / `make work`.

# --- Touch ID for sudo (note: "Using TouchID for sudo.md") -------------------
# Persistent across system updates via sudo_local (Sonoma+).
# Only useful when the lid is open; Touch ID is disabled in clamshell — see
# future_projects/macos_tooling_setup.md for the YubiKey fallback plan.
#
# Pre-check without sudo so AFK re-runs of a converged machine never invoke
# `become` here -- otherwise pam_tid.so pops a Touch ID dialog that blocks
# sudo's password prompt past Ansible's become timeout. sudo_local is 0644,
# so the stat + grep run unprivileged.

- name: "Stat /etc/pam.d/sudo_local"
  ansible.builtin.stat:
    path: /etc/pam.d/sudo_local
  register: devbox_sudo_local_stat
  tags: [macos]

- name: "Check if Touch ID PAM module already enabled in sudo_local"
  ansible.builtin.command: grep -Eq '^auth[[:space:]]+sufficient[[:space:]]+pam_tid\.so' /etc/pam.d/sudo_local
  register: devbox_sudo_local_pam_tid
  changed_when: false
  failed_when: false
  when: devbox_sudo_local_stat.stat.exists
  tags: [macos]

- name: "Ensure /etc/pam.d/sudo_local exists from Apple template"
  ansible.builtin.copy:
    src: /etc/pam.d/sudo_local.template
    dest: /etc/pam.d/sudo_local
    remote_src: true
    owner: root
    group: wheel
    mode: "0644"
    force: false
  become: true
  when: not devbox_sudo_local_stat.stat.exists
  tags: [macos]

- name: "Enable Touch ID PAM module in sudo_local"
  ansible.builtin.lineinfile:
    path: /etc/pam.d/sudo_local
    regexp: '^#?\s*auth\s+sufficient\s+pam_tid\.so\s*$'
    line: "auth       sufficient     pam_tid.so"
    state: present
  become: true
  when: devbox_sudo_local_pam_tid.rc | default(1) != 0
  tags: [macos]

# pam_reattach reattaches the sudo authentication to the user's GUI (Aqua)
# session, which is what makes the Touch ID prompt actually surface when sudo
# is invoked from a detached process context (tmux, kitty, screen, wrapper
# scripts like scripts/with_sudo_keepalive.sh). Without it, pam_tid.so silently
# skips the fingerprint dialog and falls through to password auth — the
# `Password:` prompt from `sudo -v` at wrapper start becomes a real prompt
# instead of a Touch ID tap. Installed via `pam-reattach` in
# devbox_brew_secondary; MUST come BEFORE pam_tid in the PAM stack.

- name: "Check if pam_reattach already enabled in sudo_local"
  ansible.builtin.command: grep -Eq '^auth[[:space:]]+optional[[:space:]]+.*/pam_reattach\.so' /etc/pam.d/sudo_local
  register: devbox_sudo_local_pam_reattach
  changed_when: false
  failed_when: false
  when: devbox_sudo_local_stat.stat.exists
  tags: [macos]

- name: "Enable pam_reattach in sudo_local (before pam_tid) so Touch ID works in tmux/kitty"
  ansible.builtin.lineinfile:
    path: /etc/pam.d/sudo_local
    regexp: '^#?\s*auth\s+optional\s+.*/pam_reattach\.so.*$'
    line: "auth       optional       /opt/homebrew/lib/pam/pam_reattach.so ignore_ssh"
    insertbefore: '^auth\s+sufficient\s+pam_tid\.so'
    state: present
  become: true
  when: devbox_sudo_local_pam_reattach.rc | default(1) != 0
  tags: [macos]

# --- Clamshell stay-awake (note: "Disable sleep when macbook is closed.md") --
# Mandatory for the 90%-clamshell-with-external-keyboard workflow.

- name: "Read current disablesleep state"
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      pmset -g custom | awk '/disablesleep/ {print $2; exit}'
    executable: /bin/bash
  register: devbox_pmset_disablesleep
  changed_when: false
  check_mode: false
  tags: [macos]

- name: "Disable sleep when lid is closed (clamshell mode stays awake)"
  ansible.builtin.command: pmset -a disablesleep 1
  when: devbox_pmset_disablesleep.stdout | trim != "1"
  become: true
  tags: [macos]

# --- Developer mode (note: "Enable Developer mode.md") -----------------------
# Removes the password prompt every time a debugger attaches to a process.

- name: "Check DevToolsSecurity status"
  ansible.builtin.command: /usr/sbin/DevToolsSecurity --status
  register: devbox_devtools_status
  changed_when: false
  check_mode: false
  failed_when: false
  tags: [macos]

- name: "Enable developer mode (debugger access without password)"
  ansible.builtin.command: /usr/sbin/DevToolsSecurity --enable
  when: '"enabled" not in (devbox_devtools_status.stdout | default(""))'
  become: true
  tags: [macos]

# HiDPI for external displays (note: "Enable HiDPI for external displays.md")
# is now handled by installing BetterDisplay via Homebrew cask — no Ansible
# step needed. BetterDisplay's config lives in ~/Library/Application Support;
# tracking it in this repo is a follow-up (see future_projects).
