---
- name: "Tap third-party Homebrew repositories"
  community.general.homebrew_tap:
    name: "{{ devbox_brew_taps }}"
    state: present

- name: "Install Homebrew apps"
  community.general.homebrew:
    name: "{{ devbox_brew_secondary + devbox_extra_brew }}"
    state: "{{ 'latest' if devbox_upgrade_mode | default(false) | bool else 'present' }}"

- name: "Install Homebrew casks"
  community.general.homebrew_cask:
    name: "{{ devbox_brew_secondary_casks + devbox_extra_brew_casks }}"
    state: present
    install_options: 'adopt'
    upgrade_all: false
    sudo_password: "{{ ansible_become_password }}"
  no_log: true   # Prevents the sudo password leaking into -v / -vvv output.
  register: devbox_cask_secondary_result
  failed_when:
    - devbox_cask_secondary_result.failed is defined
    - devbox_cask_secondary_result.failed
    - '"already installed" not in devbox_cask_secondary_result.msg'

# Separate task for casks whose post-install `xattr -w` step fails because the
# .pkg lays down root-owned files inside /Applications/<App>.app. Adding
# `no-binaries` skips brew's shim+Spotlight-metadata step entirely; the cask
# itself still installs and the vendor installer creates its own CLI symlinks.
# Shared base + per-profile extras, mirroring the main cask task above.
- name: "Install Homebrew casks (no-binaries variant)"
  community.general.homebrew_cask:
    name: "{{ devbox_brew_secondary_casks_no_binaries + devbox_extra_brew_casks_no_binaries }}"
    state: present
    install_options:
      - adopt
      - no-binaries
    upgrade_all: false
    sudo_password: "{{ ansible_become_password }}"
  no_log: true
  when: (devbox_brew_secondary_casks_no_binaries + devbox_extra_brew_casks_no_binaries) | length > 0
  register: devbox_cask_no_binaries_result
  failed_when:
    - devbox_cask_no_binaries_result.failed is defined
    - devbox_cask_no_binaries_result.failed
    - '"already installed" not in devbox_cask_no_binaries_result.msg'

- name: "Install npm packages"
  community.general.npm:
    name: "{{ item }}"
    global: true
    state: "{{ 'latest' if devbox_upgrade_mode | default(false) | bool else 'present' }}"
  environment:
    PATH: "/opt/homebrew/bin:{{ ansible_facts['env']['PATH'] }}"
  loop: "{{ devbox_npm_packages }}"

- name: "Init Rust toolchain"
  ansible.builtin.command:
    cmd: rustup-init -y
    creates: "{{ lookup('ansible.builtin.env', 'HOME') }}/.cargo/bin/rustc"
  environment:
    PATH: "/opt/homebrew/bin:{{ ansible_facts['env']['PATH'] }}"

- name: "Init OCaml (auto-setup writes shell hooks)"
  ansible.builtin.command:
    cmd: opam init -y -a
    creates: "{{ lookup('ansible.builtin.env', 'HOME') }}/.opam"
  environment:
    PATH: "/opt/homebrew/bin:{{ ansible_facts['env']['PATH'] }}"

- name: "Install necessary OCaml packages"
  ansible.builtin.command:
    cmd: opam install -y ocaml-lsp-server odoc ocamlformat utop
    creates: "{{ lookup('ansible.builtin.env', 'HOME') }}/.opam/default/bin/utop"
  environment:
    PATH: "/opt/homebrew/bin:{{ ansible_facts['env']['PATH'] }}"
    OPAMSWITCH: default

- name: "Install SWI-Prolog LSP server"
  ansible.builtin.command:
    cmd: swipl -g "pack_install(lsp_server, [interactive(false)])" -t halt
    creates: "{{ lookup('ansible.builtin.env', 'HOME') }}/.local/share/swi-prolog/pack/lsp_server"
  environment:
    PATH: "/opt/homebrew/bin:{{ ansible_facts['env']['PATH'] }}"
