# vim:fileencoding=utf-8:foldmethod=marker
#
# All shortcuts use macOS native virtual key codes (`0x##`) instead of
# character literals. Without this, on a Cyrillic (or any non-Latin) input
# source kitty would receive the typed character (e.g. `ц`) and the binding
# `cmd+t` would not match. Scancodes match the physical key regardless of
# the active layout. See `kitty/README.md` for the full reference table.
#
# Test checklist after edits: `future_projects/kitty_keybinding_tests.md`.

#: Fonts {{{

font_family      MesloLGS Nerd Font Mono
font_size 18.0
force_ltr no
disable_ligatures always

#: }}}

#: Cursor {{{

cursor_shape block
cursor_beam_thickness 1
cursor_blink_interval 0

#: }}}

#: Scrollback {{{

scrollback_lines 50000
scrollback_pager_history_size 8
scrollback_pager bat --paging=always --style=plain --wrap=never

#: }}}

#: Copy / Paste {{{

copy_on_select clipboard

#: }}}

#: Tab bar {{{

tab_bar_edge top
tab_bar_style separator
tab_separator "|"
tab_bar_align center
tab_switch_strategy previous
tab_activity_symbol "*"
tab_title_template "{fmt.fg.red}{bell_symbol}{activity_symbol}{fmt.fg.tab}{index}: {title}"

#: }}}

#: Layouts {{{

enabled_layouts splits,stack

#: }}}

#: Shell integration {{{
#: Enables OSC-marker injection so kitty knows where prompts start/end, what
#: the cwd is, and whether the foreground process is a shell or a real command.
#: `no-cursor` keeps everything EXCEPT kitty resetting the cursor shape after
#: each prompt — vim/nvim manage their own cursor shape and we don't want
#: kitty fighting them.

shell_integration no-cursor
# Scrollback / prompt shortcuts are remapped via scancodes below (see
# "Keybindings — Scrollback / prompts") so they survive Cyrillic layout.

#: }}}

#: macOS {{{

macos_colorspace srgb
macos_option_as_alt yes

#: }}}

#: Close / Quit policy {{{
#: Quit philosophy: the terminal is always-on. Cmd+W is a browser-muscle-memory
#: trap and stays disabled. Cmd+Q invokes a custom kitten that shows the list
#: of busy tabs (anything other than an idle shell) and asks for confirmation;
#: with an empty list it just closes the OS window. `confirm_os_window_close
#: -1` is the safety net for any other close path (window manager X button,
#: `kitty @ close-window`, etc.) — negative value + shell_integration means
#: it only counts windows where a non-shell command is running.

confirm_os_window_close -1
allow_remote_control yes

# Cmd+W (physical W = 0x0D): disabled. No accidental tab kills.
map cmd+0x0D no_op

# Cmd+Q: custom kitten. See `quit_confirm.py` for the prompt + filter logic.
map cmd+q kitten quit_confirm.py

#: }}}

#: Session restore {{{
#: Snapshot is regenerated by `kitty-save-session` (fish function, alias `kss`).
#: Missing file is OK — kitty silently ignores absent startup_session.

startup_session ~/.config/kitty/last-session.conf

#: }}}

#: Keybindings — Splits {{{

# Cmd+D — vsplit
map cmd+0x02 launch --location=vsplit --cwd=current
# Cmd+Shift+D — hsplit (overrides kitty's macOS default that bound this to close_window)
map cmd+shift+0x02 launch --location=hsplit --cwd=current
map cmd+opt+left  neighboring_window left
map cmd+opt+right neighboring_window right
map cmd+opt+up    neighboring_window up
map cmd+opt+down  neighboring_window down
# Cmd+Shift+Enter — "zoom" active split, press again to revert
map cmd+shift+0x24 toggle_layout stack

#: }}}

#: Keybindings — Tabs {{{

# Cmd+T — new tab at HOME
map cmd+0x11 launch --type=tab
# Cmd+Shift+T — new tab at current cwd
map cmd+shift+0x11 launch --type=tab --cwd=current
map cmd+1 goto_tab 1
map cmd+2 goto_tab 2
map cmd+3 goto_tab 3
map cmd+4 goto_tab 4
map cmd+5 goto_tab 5
map cmd+6 goto_tab 6
map cmd+7 goto_tab 7
map cmd+8 goto_tab 8
map cmd+9 goto_tab 9

#: }}}

#: Keybindings — Clipboard (layout-independent) {{{
#: Kitty's defaults for Cmd+C/V/X match against the character produced by the
#: key, so on a Cyrillic layout `Cmd+С` (cyrillic es) does not equal `Cmd+C`
#: and clipboard ops silently break. Scancode bindings fix that.

# Cmd+C — copy
map cmd+0x08 copy_to_clipboard
# Cmd+V — paste
map cmd+0x09 paste_from_clipboard
# Cmd+X — cut
map cmd+0x07 cut_to_clipboard

#: }}}

#: Keybindings — Font size {{{

map cmd+equal change_font_size all +1.0
map cmd+minus change_font_size all -1.0
map cmd+0 change_font_size all 0

#: }}}

#: Keybindings — Readline / Ctrl+letter (layout-independent) {{{
#: Why this exists: terminals translate Ctrl+ASCII-letter into a single
#: control byte (Ctrl+A → \x01, Ctrl+W → \x17, etc). macOS only does this
#: translation when the active input source produces a Latin letter. On a
#: Cyrillic input source, Ctrl+W becomes Ctrl+ц which has no control byte
#: equivalent — Claude Code, fish, vim never see the readline command and
#: the user types cyrillic letters into their prompt.
#:
#: Each map intercepts at the physical-key layer (scancode) and emits the
#: correct control byte regardless of active input source. Behaviour on EN
#: layout is unchanged (kitty produces the same byte either way).
#:
#: Set covers readline + standard signals. Skipped on purpose:
#:   Ctrl+I = Tab          Ctrl+J / Ctrl+M = Enter variants
#:   Ctrl+S / Ctrl+Q = XOFF / XON (terminal flow control, can hang shells)
#:   Ctrl+O / Ctrl+V / Ctrl+X = mode-specific readline (literal char etc.)

# NOTE: kitty.conf does not support trailing `#` comments on map lines —
# everything after the action is part of the `send_text` payload. Keep
# each binding's description on its own line above the map.

# Ctrl+A — beginning of line. A's native code is 0x00 = kitty's "no key"
# sentinel, so `map ctrl+0x00` is inert; A is the one letter the scancode
# scheme can't cover. RU stopgap: ф is physical A on ЙЦУКЕН. See README.
map ctrl+ф send_text all \x01
# Ctrl+B — back one character
map ctrl+0x0B send_text all \x02
# Ctrl+C — SIGINT / interrupt
map ctrl+0x08 send_text all \x03
# Ctrl+D — EOF / delete-forward
map ctrl+0x02 send_text all \x04
# Ctrl+E — end of line
map ctrl+0x0E send_text all \x05
# Ctrl+F — forward one character
map ctrl+0x03 send_text all \x06
# Ctrl+G — bell / cancel partial input
map ctrl+0x05 send_text all \x07
# Ctrl+H — backspace
map ctrl+0x04 send_text all \x08
# Ctrl+K — kill to end of line
map ctrl+0x28 send_text all \x0b
# Ctrl+L — clear screen
map ctrl+0x25 send_text all \x0c
# Ctrl+N — next history
map ctrl+0x2D send_text all \x0e
# Ctrl+P — previous history
map ctrl+0x23 send_text all \x10
# Ctrl+R — reverse history search
map ctrl+0x0F send_text all \x12
# Ctrl+T — transpose adjacent chars
map ctrl+0x11 send_text all \x14
# Ctrl+U — kill to start of line
map ctrl+0x20 send_text all \x15
# Ctrl+W — kill word backwards
map ctrl+0x0D send_text all \x17
# Ctrl+Y — yank (restore last killed text)
map ctrl+0x10 send_text all \x19
# Ctrl+Z — SIGTSTP / suspend foreground process
map ctrl+0x06 send_text all \x1a
# Ctrl+/ — undo last readline edit
map ctrl+0x2C send_text all \x1f

#: }}}

#: Keybindings — Scrollback / prompts (cyrillic-fixed) {{{
#: Kitty's shell-integration ships built-in bindings for prompt-jump and
#: pager-view (ctrl+shift+z/x/g/h) that match by character, so they break on
#: a non-Latin input source — same failure mode as the Ctrl+letter block
#: above. Scancode remaps restore them regardless of active layout.

# Ctrl+Shift+Z — jump to previous prompt (physical Z = 0x06)
map ctrl+shift+0x06 scroll_to_prompt -1
# Ctrl+Shift+X — jump to next prompt (physical X = 0x07)
map ctrl+shift+0x07 scroll_to_prompt 1
# Ctrl+Shift+G — view last command output in pager (physical G = 0x05)
map ctrl+shift+0x05 show_last_command_output
# Ctrl+Shift+H — view full scrollback in pager (physical H = 0x04)
map ctrl+shift+0x04 show_scrollback

#: }}}

#: Keybindings — Hints (select text patterns from terminal output) {{{

# Ctrl+Shift+E — URL hints, open in browser
map ctrl+shift+0x0E kitten hints
# Cmd+Shift+P — file paths, paste into prompt
map cmd+shift+0x23 kitten hints --type path --program @
# Cmd+Shift+G — file:line, open in editor
map cmd+shift+0x05 kitten hints --type linenum
# Cmd+Shift+H — git/SHA hashes, copy to clipboard
map cmd+shift+0x04 kitten hints --type hash --program -

#: }}}

#: Keybindings — File picker {{{

# Cmd+Shift+O — fuzzy file picker, paste path
map cmd+shift+0x1F kitten choose_files

#: }}}

include current-theme.conf
