- name: Default playbook for basic system setup
  hosts: 127.0.0.1
  connection: local

  # Prompted once at playbook start. Captured under the magic variable name
  # `ansible_become_password` so it serves two purposes simultaneously:
  #   1. Ansible uses it transparently for any `become: true` task — no `-K` flag needed.
  #   2. It is forwarded to `community.general.homebrew_cask` via `sudo_password:` so
  #      brew can install pkg-based casks (e.g. karabiner-elements) non-interactively
  #      without resorting to a NOPASSWD sudoers rule.
  # Tasks that consume it MUST set `no_log: true` to keep verbose output safe.
  vars_prompt:
    - name: ansible_become_password
      prompt: "Sudo password (used for become tasks and Homebrew cask pkg installers)"
      private: true
      confirm: false

  vars_files:
    - "{{ vault_file | default('../vault/devbox_ssh_config.yml') }}"

  # Touch ID for sudo (pam_tid.so) pops a UI dialog before sudo reads its
  # stdin password. The dialog has a ~60s timeout, so Ansible's default
  # become timeout of 10s fails AFK runs with "Timed out waiting for become
  # success or become password prompt". 120s lets the dialog expire and
  # fall through to password auth.
  vars:
    ansible_become_timeout: 120

  roles:
    - devbox

  post_tasks:
    # Stamp the active profile to .devbox-profile at repo root so slim playbooks
    # (dotfiles-push, shell-push, mcp-sync, claude-push, local-push, macos-defaults)
    # can recover the profile without re-running the full personal/work playbook.
    # Without this, those targets would re-render config files with the default
    # devbox_projects_dir from core.yml and silently overwrite a work machine's
    # PROJECTS_DIR with the personal value.
    - name: Stamp active profile to .devbox-profile
      ansible.builtin.copy:
        content: "{{ devbox_active_profile }}\n"
        dest: "{{ playbook_dir }}/../.devbox-profile"
        mode: '0644'
      when: devbox_active_profile is defined and devbox_active_profile != "unknown"
      delegate_to: localhost
      tags: [always]
