---
# `check_mode: false` on tap + trust steps is intentional. Without it, a
# dry-run (`make check-personal`/`make check-work`) silently skips both, and
# any subsequent `brew install` of a formula from a newly-declared tap then
# fails with "No available formula or cask with the name ...". Tap and trust
# are idempotent and easily reversible (`brew untap`, manual edit of brew
# trust manifest), so executing them during a dry-run is acceptable — the
# alternative is a check that lies about what a real run would do.
- name: "Tap third-party Homebrew repositories"
  community.general.homebrew_tap:
    name: "{{ devbox_brew_taps }}"
    state: present
  check_mode: false

# Homebrew 6.0 (HOMEBREW_REQUIRE_TAP_TRUST, on by default) refuses to load
# formulae from un-trusted third-party taps — *any* untrusted tap aborts any
# `brew install`/`brew update`, even if we are not installing from it, because
# brew enumerates all tapped repos when computing dependencies. So we must
# trust the full set of tapped non-official repos, not just devbox_brew_taps.
#
# The sweep approach (enumerate `brew tap`, skip homebrew/core + homebrew/cask)
# tolerates latent state from past experiments: as long as a tap is on the
# machine, it gets trusted. `make audit-taps` reports strays so the user can
# decide to untap (via `make untap-stale`) or declare.
#
# There is no community.general `homebrew_trust` module as of 13.0.0, so trust
# is granted via the brew CLI directly. Whole-tap trust (not --formula) because
# Homebrew rejects --formula for custom remotes (#22685).
- name: "Read Homebrew trust manifest"
  ansible.builtin.command: brew trust --json v1
  register: devbox_brew_trust_state
  changed_when: false
  check_mode: false

- name: "Enumerate all currently tapped Homebrew repositories"
  ansible.builtin.command: brew tap
  register: devbox_brew_tapped_list
  changed_when: false
  check_mode: false

- name: "Trust all non-official tapped Homebrew repositories"
  ansible.builtin.command:
    cmd: "brew trust --tap {{ item }}"
  loop: "{{ devbox_brew_tapped_list.stdout_lines | reject('match', '^homebrew/(core|cask)$') | list }}"
  when: (item | lower) not in (devbox_brew_trust_state.stdout | lower)
  changed_when: true
  check_mode: false  # see comment on the tap task above

- name: "Install Homebrew apps"
  community.general.homebrew:
    name: "{{ devbox_brew_secondary + devbox_extra_brew }}"
    state: "{{ 'latest' if devbox_upgrade_mode | default(false) | bool else 'present' }}"

- name: "Install Homebrew casks"
  community.general.homebrew_cask:
    name: "{{ devbox_brew_secondary_casks + devbox_extra_brew_casks }}"
    state: present
    install_options: 'adopt'
    upgrade_all: false
    sudo_password: "{{ devbox_sudo_password }}"
  no_log: true   # Prevents the sudo password leaking into -v / -vvv output.
  register: devbox_cask_secondary_result
  failed_when:
    - devbox_cask_secondary_result.failed is defined
    - devbox_cask_secondary_result.failed
    - '"already installed" not in devbox_cask_secondary_result.msg'

# Separate task for casks whose post-install `xattr -w` step fails because the
# .pkg lays down root-owned files inside /Applications/<App>.app. Adding
# `no-binaries` skips brew's shim+Spotlight-metadata step entirely; the cask
# itself still installs and the vendor installer creates its own CLI symlinks.
# Shared base + per-profile extras, mirroring the main cask task above.
- name: "Install Homebrew casks (no-binaries variant)"
  community.general.homebrew_cask:
    name: "{{ devbox_brew_secondary_casks_no_binaries + devbox_extra_brew_casks_no_binaries }}"
    state: present
    install_options:
      - adopt
      - no-binaries
    upgrade_all: false
    sudo_password: "{{ devbox_sudo_password }}"
  no_log: true
  when: (devbox_brew_secondary_casks_no_binaries + devbox_extra_brew_casks_no_binaries) | length > 0
  register: devbox_cask_no_binaries_result
  failed_when:
    - devbox_cask_no_binaries_result.failed is defined
    - devbox_cask_no_binaries_result.failed
    - '"already installed" not in devbox_cask_no_binaries_result.msg'

- name: "Install npm packages"
  community.general.npm:
    name: "{{ item }}"
    global: true
    state: "{{ 'latest' if devbox_upgrade_mode | default(false) | bool else 'present' }}"
  environment:
    PATH: "/opt/homebrew/bin:{{ ansible_facts['env']['PATH'] }}"
  loop: "{{ devbox_npm_packages }}"

- name: "Init Rust toolchain"
  ansible.builtin.command:
    cmd: rustup-init -y
    creates: "{{ lookup('ansible.builtin.env', 'HOME') }}/.cargo/bin/rustc"
  environment:
    PATH: "/opt/homebrew/bin:{{ ansible_facts['env']['PATH'] }}"

- name: "Init OCaml (auto-setup writes shell hooks)"
  ansible.builtin.command:
    cmd: opam init -y -a
    creates: "{{ lookup('ansible.builtin.env', 'HOME') }}/.opam"
  environment:
    PATH: "/opt/homebrew/bin:{{ ansible_facts['env']['PATH'] }}"

- name: "Install necessary OCaml packages"
  ansible.builtin.command:
    cmd: opam install -y ocaml-lsp-server odoc ocamlformat utop
    creates: "{{ lookup('ansible.builtin.env', 'HOME') }}/.opam/default/bin/utop"
  environment:
    PATH: "/opt/homebrew/bin:{{ ansible_facts['env']['PATH'] }}"
    OPAMSWITCH: default

- name: "Install SWI-Prolog LSP server"
  ansible.builtin.command:
    cmd: swipl -g "pack_install(lsp_server, [interactive(false)])" -t halt
    creates: "{{ lookup('ansible.builtin.env', 'HOME') }}/.local/share/swi-prolog/pack/lsp_server"
  environment:
    PATH: "/opt/homebrew/bin:{{ ansible_facts['env']['PATH'] }}"
