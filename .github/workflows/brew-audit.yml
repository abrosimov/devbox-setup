name: brew-audit

# Periodic supply-chain audit of the Homebrew package set managed by this repo.
# Uses `brew vulns` (built into Homebrew core since it was merged from the now
# archived Homebrew/brew-vulns tap, queries OSV.dev) to scan the package set
# declared in roles/devbox/defaults/main/packages.yml plus the personal profile
# extras. The merged command dropped SARIF output, so this workflow is a plain
# pass/fail gate: it prints the full report to the job log and fails on any open
# high-severity (or above) finding.
#
# Why a separate workflow from ci.yml: needs a macOS runner (Homebrew). ci.yml
# is Ubuntu.

on:
  schedule:
    # Weekly, Monday 06:00 UTC. Random offset would be ideal but GH Actions
    # cron is on the minute — no jitter built in.
    - cron: "0 6 * * 1"
  workflow_dispatch:
  pull_request:
    paths:
      - "roles/devbox/defaults/main/packages.yml"
      - "profiles/*.yml"
      - ".github/workflows/brew-audit.yml"
      - "Makefile"

permissions:
  contents: read

concurrency:
  group: brew-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  brew-vulns:
    name: Brew CVE scan (OSV via brew-vulns)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Update Homebrew (brew vulns is a built-in command)
        run: brew update

      - name: Generate Brewfile from repo declarations
        run: |
          make audit-brewfile > Brewfile.audit
          echo "--- Brewfile.audit ---"
          cat Brewfile.audit

      - name: Run brew vulns (full report)
        run: |
          # Full report across all severities for the job log. `|| true` so the
          # gate step below — not this one — decides the job's pass/fail state.
          brew vulns --brewfile Brewfile.audit --json || true

      - name: Fail on high-severity vulnerabilities
        run: |
          # `brew vulns` exits non-zero when any open finding at or above the
          # requested severity is present. This is the pass/fail gate.
          brew vulns --brewfile Brewfile.audit --severity high
