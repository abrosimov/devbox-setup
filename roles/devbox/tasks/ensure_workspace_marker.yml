---
# Ensure the workspace root (`$AION_AUTOPOIESEON` / `{{ devbox_projects_dir }}`)
# exists and carries a WORKSPACE.md marker explaining what it is. The marker is
# informational only — `proj`/`wt` tooling still works without it. Skipped in
# dev_mode so debug runs do not touch the live workspace.
- name: "Resolve workspace root path"
  ansible.builtin.set_fact:
    devbox_workspace_root: "{{ devbox_projects_dir | replace('$HOME', ansible_env.HOME) }}"

- name: "Ensure workspace root directory exists"
  ansible.builtin.file:
    path: "{{ devbox_workspace_root }}"
    state: directory
    mode: '0755'
  when: not (dev_mode | default(false) | bool)

- name: "Write WORKSPACE.md marker"
  ansible.builtin.template:
    src: WORKSPACE.md.j2
    dest: "{{ devbox_workspace_root }}/WORKSPACE.md"
    mode: '0644'
  when: not (dev_mode | default(false) | bool)
