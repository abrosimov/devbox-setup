---
- name: Find fish shell path
  ansible.builtin.command: "command -v fish"
  register: fish_shell_path
  changed_when: false
  failed_when: fish_shell_path.rc != 0

- name: Find fc-cache path
  ansible.builtin.command: "command -v fc-cache"
  register: fc_cache_path
  changed_when: false
  failed_when: false

- name: Regenerate font cache for user directories
  ansible.builtin.command: "{{ fc_cache_path.stdout }} -f {{ ansible_facts['env']['HOME'] }}/Library/Fonts {{ ansible_facts['env']['HOME'] }}/.local/share/fonts"
  become: true
  become_user: "{{ devbox_user.login }}"
  when: fc_cache_path.rc == 0
  changed_when: false
  failed_when: false

- name: "Migration: remove pinned tide@v6 before unpinned install"
  ansible.builtin.shell: "{{ fish_shell_path.stdout }} -c 'fisher remove ilancosman/tide@v6'"
  args:
    executable: /bin/bash
  become: true
  become_user: "{{ devbox_user.login }}"
  changed_when: false
  failed_when: false

- name: Install fisher plugins
  ansible.builtin.shell: "{{ fish_shell_path.stdout }} -c 'fisher install {{ item }}'"
  args:
    executable: /bin/bash
  loop: "{{ devbox_fish_plugins }}"
  become: true
  become_user: "{{ devbox_user.login }}"
  changed_when: false

- name: "Configure done plugin: 300s threshold, Kitty remote control"
  ansible.builtin.shell: |
    {{ fish_shell_path.stdout }} -c '
      set -U __done_min_cmd_duration 300000
      set -U __done_kitty_remote_control 1
      set -U __done_notification_duration 5000
    '
  args:
    executable: /bin/bash
  become: true
  become_user: "{{ devbox_user.login }}"
  changed_when: false

- name: Update fisher plugins
  ansible.builtin.shell: "{{ fish_shell_path.stdout }} -c 'fisher update'"
  args:
    executable: /bin/bash
  become: true
  become_user: "{{ devbox_user.login }}"
  changed_when: false

- name: Configure tide prompt (auto mode)
  ansible.builtin.shell: "{{ fish_shell_path.stdout }} -c '{{ devbox_tide_configure_auto }}'"
  args:
    executable: /bin/bash
  become: true
  become_user: "{{ devbox_user.login }}"
  changed_when: false

# --- MCP servers data directories ---

- name: Create MCP memory data directory
  ansible.builtin.file:
    path: "{{ devbox_paths.dotfiles_root_dir }}/.claude/memory"
    state: directory
    mode: "0755"
  become: true
  become_user: "{{ devbox_user.login }}"
  tags: [configs, mcp]

# --- Claude Code MCP servers ---
# Registered via `claude mcp add --scope user` → writes to ~/.claude.json.
# settings.json is for permissions/sandbox only, not MCP servers.

- name: Find Claude Code CLI path
  ansible.builtin.command: "command -v claude"
  register: claude_cli_path
  changed_when: false
  failed_when: false
  tags: [configs, claude]

- name: Add Claude Code plugin marketplaces
  ansible.builtin.command: >
    {{ claude_cli_path.stdout }} plugin marketplace add {{ item.repo }}
  loop: "{{ claude_plugin_marketplaces }}"
  loop_control:
    label: "{{ item.name }}"
  become: true
  become_user: "{{ devbox_user.login }}"
  when: claude_cli_path.rc == 0
  changed_when: false
  failed_when: false
  tags: [configs, claude]

- name: Install Claude Code plugins (user scope)
  ansible.builtin.command: >
    {{ claude_cli_path.stdout }} plugin install {{ item.name }}@{{ item.marketplace }} --scope user
  loop: "{{ claude_plugins }}"
  loop_control:
    label: "{{ item.name }}@{{ item.marketplace }}"
  become: true
  become_user: "{{ devbox_user.login }}"
  when: claude_cli_path.rc == 0
  changed_when: false
  failed_when: false
  tags: [configs, claude]

- name: Register Claude Code MCP servers - Docker (user scope)
  ansible.builtin.command: >
    {{ claude_cli_path.stdout }} mcp add
    --transport stdio
    --scope user
    {{ item.name }}
    -- docker run --rm -i
    {% if item.network is defined %}--network={{ item.network }}{% endif %}
    {% if item.read_only | default(false) %}--read-only{% endif %}
    {% if item.init | default(false) %}--init{% endif %}
    {{ item.image }}
  loop: "{{ mcp_docker_servers }}"
  become: true
  become_user: "{{ devbox_user.login }}"
  when: claude_cli_path.rc == 0
  changed_when: false
  failed_when: false
  tags: [configs, claude]

- name: Register Claude Code MCP servers - Script (user scope)
  ansible.builtin.command: >
    {{ claude_cli_path.stdout }} mcp add
    --transport stdio
    --scope user
    {{ item.name }}
    -- {{ item.command }}
  loop: "{{ mcp_script_servers }}"
  become: true
  become_user: "{{ devbox_user.login }}"
  when: claude_cli_path.rc == 0
  changed_when: false
  failed_when: false
  tags: [configs, claude]

- name: Register Claude Code MCP servers - HTTP (user scope)
  ansible.builtin.command: >
    {{ claude_cli_path.stdout }} mcp add
    --transport {{ item.transport | default('http') }}
    --scope user
    {{ item.name }}
    {{ item.url }}
  loop: "{{ mcp_http_servers }}"
  become: true
  become_user: "{{ devbox_user.login }}"
  when: claude_cli_path.rc == 0
  changed_when: false
  failed_when: false
  tags: [configs, claude]
