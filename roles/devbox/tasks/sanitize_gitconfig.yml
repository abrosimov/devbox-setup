---
# Migrate ~/.gitconfig into managed schema:
#   • behavioural keys (core.editor, core.quotepath, push.followTags, pull.ff)
#     live in the managed XDG config at ~/.config/git/config
#   • identity keys (user.name/email/signingkey, [gpg], [commit], [tag],
#     init.defaultBranch, jira.keyPosition) live in the per-profile
#     identity-{profile}.gitconfig, generated by scripts/git-identity-gen.py
#     and pulled in via includeIf.
#
# On steady state ~/.gitconfig no longer exists. This task auto-archives it to
# ~/.gitconfig.bak.<timestamp> when every key it contains is in the known set —
# any unknown key aborts the run with an actionable message.
#
# Skipped in dev_mode (dotfiles land under .devbox/debug/ — do not touch real $HOME).

- name: "Sanitize gitconfig — check for legacy ~/.gitconfig"
  ansible.builtin.stat:
    path: "{{ ansible_facts['env']['HOME'] }}/.gitconfig"
  register: devbox_gitconfig_stat
  tags: [git, sanitize]

- name: "Sanitize gitconfig — collect keys currently defined"
  # --name-only avoids printing values (nothing sensitive lands in logs).
  # Non-zero exit here is treated as "empty file, nothing to migrate".
  ansible.builtin.command:
    argv:
      - git
      - config
      - --file
      - "{{ ansible_facts['env']['HOME'] }}/.gitconfig"
      - --list
      - --name-only
  register: devbox_gitconfig_keys
  changed_when: false
  failed_when: false
  when: devbox_gitconfig_stat.stat.exists
  tags: [git, sanitize]

- name: "Sanitize gitconfig — classify keys"
  ansible.builtin.set_fact:
    # Every key we know how to migrate. Values written to ~/.gitconfig for these
    # are archived (they've either moved to managed config.j2 or to the per-profile
    # identity file).
    devbox_gitconfig_known_keys:
      # → identity-{profile}.gitconfig (generated by scripts/git-identity-gen.py)
      - user.name
      - user.email
      - user.signingkey
      - gpg.format
      - commit.gpgsign
      - tag.gpgsign
      - init.defaultbranch
      - jira.keyposition
      # → managed config.j2 (this repo, XDG global)
      - core.editor
      - core.quotepath
      - core.hookspath
      - push.followtags
      - push.default
      - push.autosetupremote
      - pull.ff
      - fetch.prune
      - rebase.autostash
      - rebase.autosquash
      - merge.conflictstyle
      - rerere.enabled
      - diff.algorithm
      - diff.colormoved
      - advice.detachedhead
    devbox_gitconfig_actual_keys: >-
      {{ (devbox_gitconfig_keys.stdout_lines | default([]))
         | map('lower') | list }}
  when: devbox_gitconfig_stat.stat.exists
  tags: [git, sanitize]

- name: "Sanitize gitconfig — detect unknown keys"
  ansible.builtin.set_fact:
    devbox_gitconfig_unknown_keys: >-
      {{ devbox_gitconfig_actual_keys
         | reject('in', devbox_gitconfig_known_keys)
         | list | unique }}
  when: devbox_gitconfig_stat.stat.exists
  tags: [git, sanitize]

- name: "Sanitize gitconfig — abort if unknown keys present"
  ansible.builtin.fail:
    msg: |
      ~/.gitconfig contains keys the managed schema does not know how to migrate:
        {{ devbox_gitconfig_unknown_keys | join(', ') }}

      Either
        (a) fold these into roles/devbox/files/.config/git/config.j2 (behavioural)
            or scripts/git-identity-gen.py (per-profile identity),
            then extend `devbox_gitconfig_known_keys` in this task, and re-run; or
        (b) remove the keys from ~/.gitconfig manually and re-run.
  when:
    - devbox_gitconfig_stat.stat.exists
    - devbox_gitconfig_unknown_keys | length > 0
  tags: [git, sanitize]

- name: "Sanitize gitconfig — archive ~/.gitconfig"
  # Every key is known → the file's content is now redundant with managed
  # config + identity file. Archive with a timestamped .bak so nothing is lost.
  ansible.builtin.command:
    argv:
      - mv
      - "{{ ansible_facts['env']['HOME'] }}/.gitconfig"
      - "{{ ansible_facts['env']['HOME'] }}/.gitconfig.bak.{{ ansible_facts['date_time']['iso8601_basic_short'] }}"
  register: devbox_gitconfig_archive
  changed_when: devbox_gitconfig_archive.rc == 0
  when:
    - devbox_gitconfig_stat.stat.exists
    - devbox_gitconfig_actual_keys | length > 0
    - devbox_gitconfig_unknown_keys | length == 0
  tags: [git, sanitize]

- name: "Sanitize gitconfig — remove empty ~/.gitconfig"
  # Edge case: the file exists but has no keys (only comments or blank lines).
  # No need to archive — just delete so git stops loading a no-op file.
  ansible.builtin.file:
    path: "{{ ansible_facts['env']['HOME'] }}/.gitconfig"
    state: absent
  when:
    - devbox_gitconfig_stat.stat.exists
    - devbox_gitconfig_actual_keys | length == 0
  tags: [git, sanitize]
