---
# =============================================================================
# Block 1: .claude managed subdirs — one-way rsync from repo to ~/.claude/<dir>/
# --delete is scoped per subdir, so host-only state under ~/.claude/ (projects/,
# plans/, memory/, plugins/, todos/, statsig/, ...) is never in scope.
# =============================================================================

- name: Ensure .claude directory exists
  ansible.builtin.file:
    path: "{{ devbox_paths.dotfiles_root_dir }}/.claude"
    state: directory
    mode: "0755"
  tags: [configs, claude]

- name: Check existing .claude subdirectory types
  ansible.builtin.stat:
    path: "{{ devbox_paths.dotfiles_root_dir }}/.claude/{{ item }}"
  loop: "{{ devbox_claude_managed_dirs }}"
  loop_control:
    label: ".claude/{{ item }}"
  register: devbox_claude_dir_stats
  tags: [configs, claude]

- name: "Remove stale symlinks (legacy: managed subdirs used to be symlinks into the repo)"
  ansible.builtin.file:
    path: "{{ devbox_paths.dotfiles_root_dir }}/.claude/{{ item.item }}"
    state: absent
  loop: "{{ devbox_claude_dir_stats.results }}"
  loop_control:
    label: ".claude/{{ item.item }}"
  when: item.stat.exists and item.stat.islnk
  tags: [configs, claude]

- name: Ensure managed .claude subdirs exist as real directories
  ansible.builtin.file:
    path: "{{ devbox_paths.dotfiles_root_dir }}/.claude/{{ item }}"
    state: directory
    mode: "0755"
  loop: "{{ devbox_claude_managed_dirs }}"
  loop_control:
    label: ".claude/{{ item }}"
  tags: [configs, claude]

- name: Sync managed .claude subdirs from repo (one-way, --delete scoped per subdir)
  ansible.posix.synchronize:
    src: "{{ role_path }}/files/dot_claude/{{ item }}/"
    dest: "{{ devbox_paths.dotfiles_root_dir }}/.claude/{{ item }}/"
    delete: true
    recursive: true
    perms: true
    rsync_opts:
      - "--exclude=.DS_Store"
      - "--exclude=__pycache__"
      - "--exclude=.venv"
      - "--exclude=.hypothesis"
      - "--exclude=.pytest_cache"
  delegate_to: localhost
  loop: "{{ devbox_claude_managed_dirs }}"
  loop_control:
    label: ".claude/{{ item }}/"
  tags: [configs, claude]

# =============================================================================
# Block 1b: Claude hooks runtime venv
# The scripts under .claude/bin/ declare their dependencies (notably bashlex
# for bash_decision_gate.py) in bin/pyproject.toml. We materialise an
# isolated .venv next to them via `uv sync --frozen`. hooks.json invokes
# each script as `uv run --project ~/.claude/bin python ~/.claude/bin/<x>.py`
# which resolves to that same .venv. --no-dev excludes pytest/hypothesis
# from the deployed venv — those are dev-only and live in the repo for
# `make test-claude-hooks`.
# Runs in both the full playbook and the slim `make claude-push` flow,
# since playbooks/claude.yml import_tasks install_configs.yml.
# =============================================================================

- name: Find uv path
  ansible.builtin.command: "command -v uv"
  register: devbox_uv_path
  changed_when: false
  check_mode: false
  failed_when: devbox_uv_path.rc != 0
  tags: [configs, claude]

- name: Bootstrap Claude hooks venv via uv sync
  ansible.builtin.command:
    cmd: "{{ devbox_uv_path.stdout }} sync --frozen --no-dev"
    chdir: "{{ devbox_paths.dotfiles_root_dir }}/.claude/bin"
  register: devbox_claude_uv_sync
  changed_when: >-
    'Resolved' in (devbox_claude_uv_sync.stderr | default(''))
    or 'Installed' in (devbox_claude_uv_sync.stderr | default(''))
    or 'Prepared' in (devbox_claude_uv_sync.stderr | default(''))
  tags: [configs, claude]

# =============================================================================
# Block 2: .claude root files — explicit copy
# USER_AUTHORITY_PROTOCOL.md is renamed on the host to CLAUDE.md (the filename
# Claude Code expects); other files keep their names.
# =============================================================================

- name: Deploy .claude root files
  ansible.builtin.copy:
    src: "{{ role_path }}/files/dot_claude/{{ item.src }}"
    dest: "{{ devbox_paths.dotfiles_root_dir }}/.claude/{{ item.dest }}"
    mode: "0644"
  loop:
    - { src: USER_AUTHORITY_PROTOCOL.md, dest: CLAUDE.md }
    - { src: settings.json, dest: settings.json }
    - { src: hooks.json, dest: hooks.json }
    - { src: config.md, dest: config.md }
  loop_control:
    label: ".claude/{{ item.dest }}"
  tags: [configs, claude]

# =============================================================================
# Block 3: dotfile directories — copy whole dir (no --delete, safe for overlay)
#
# First: ensure the parent dirs that subsequent individual-file copies
# (Block 4, Block 4b) and template renders (Block 5) write into. Whole-dir
# copies in this block (kitty/, nvim/, fish/completions/, fish/functions/,
# .config/git/hooks/) create their own dest, so we only enumerate the
# parents that individual `copy` and `template` tasks depend on.
#
# Idempotent by design, and required for greenfield targets: in dev_mode
# devbox_paths.dotfiles_root_dir is a fresh empty tree (.devbox/debug/dotfiles),
# so relying on fish having pre-created ~/.config/fish/conf.d/ silently
# broke `make dev-personal` and would break any CI run against clean FS.
# =============================================================================

- name: Ensure dotfile parent directories exist
  ansible.builtin.file:
    path: "{{ devbox_paths.dotfiles_root_dir }}/{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - .config
    - .config/fish
    - .config/fish/conf.d
    - .config/git
  tags: [configs, dotfiles]

- name: Deploy dotfile directories
  ansible.builtin.copy:
    src: "{{ role_path }}/files/{{ item }}/"
    dest: "{{ devbox_paths.dotfiles_root_dir }}/{{ item }}/"
    mode: "0644"
    directory_mode: "0755"
  loop:
    - .config/kitty
    - .config/nvim
    - .config/fish/completions
    - .config/fish/functions
  loop_control:
    label: "{{ item }}/"
  tags: [configs, dotfiles]

# =============================================================================
# Block 3b: global git hooks — executable scripts (activated via core.hooksPath
# in ~/.gitconfig). Plain global hooks, not installed per-repo by proj.
#
# One-way rsync with `delete: true`: the repo is the single source of truth
# for the global hooks directory. This purges third-party artefacts left by
# `git lfs install --global` (post-checkout / post-commit / post-merge /
# pre-push), which otherwise fire on every `git clone` — including
# `brew tap` — and abort with "git-lfs was not found" when brew invokes
# git with a sanitised PATH. If a user wants LFS, they should run
# `git lfs install --local` per-repo instead.
# =============================================================================

- name: Sync global git hooks (one-way, --delete purges non-managed hooks like stale git-lfs)
  ansible.posix.synchronize:
    src: "{{ role_path }}/files/.config/git/hooks/"
    dest: "{{ devbox_paths.dotfiles_root_dir }}/.config/git/hooks/"
    delete: true
    recursive: true
    rsync_opts:
      - "--exclude=.DS_Store"
      - "--chmod=D0755,F0755"
  delegate_to: localhost
  tags: [configs, dotfiles]

# =============================================================================
# Block 4: individual plain files that don't fit a directory copy
# =============================================================================

- name: Deploy individual config files
  ansible.builtin.copy:
    src: "{{ role_path }}/files/{{ item }}"
    dest: "{{ devbox_paths.dotfiles_root_dir }}/{{ item }}"
    mode: "0644"
  loop:
    - .config/fish/config.fish
    - .config/fish/conf.d/aliases.fish
    - .config/fish/conf.d/tide_items.fish
    - .config/fish/conf.d/fnm.fish
    - .node-version
    - README.md
  loop_control:
    label: "{{ item }}"
  tags: [configs, dotfiles]

- name: Deploy confidential config (skip if exists)
  ansible.builtin.copy:
    src: "{{ role_path }}/files/.config/fish/conf.d/_init_env_confidential.fish"
    dest: "{{ devbox_paths.dotfiles_root_dir }}/.config/fish/conf.d/_init_env_confidential.fish"
    mode: "0644"
    force: false
  tags: [configs, dotfiles]

# =============================================================================
# Block 5: Jinja2 templates
# Destination directories are ensured up front (see Block 3's first task).
# =============================================================================

- name: Render config templates
  ansible.builtin.template:
    src: "{{ role_path }}/files/{{ item.src }}"
    dest: "{{ devbox_paths.dotfiles_root_dir }}/{{ item.dest }}"
    mode: "0644"
  loop:
    - { src: .bashrc.j2, dest: .bashrc }
    - { src: .gemrc.j2, dest: .gemrc }
    - { src: .npmrc.j2, dest: .npmrc }
    - { src: .config/git/config.j2, dest: .config/git/config }
    - { src: .config/fish/conf.d/_init_env.fish.j2, dest: .config/fish/conf.d/_init_env.fish }
  loop_control:
    label: "{{ item.dest }}"
  tags: [configs, dotfiles]

# OS-specific git overlay. Included from ~/.config/git/config via [include]
# path = ~/.config/git/config-{darwin,linux}. Only the current-OS file is
# deployed; the missing include is silently ignored by git.
- name: Render OS-specific git config overlay (Darwin)
  ansible.builtin.template:
    src: "{{ role_path }}/files/.config/git/config-darwin.j2"
    dest: "{{ devbox_paths.dotfiles_root_dir }}/.config/git/config-darwin"
    mode: "0644"
  when: ansible_facts['os_family'] == 'Darwin'
  tags: [configs, dotfiles]

# =============================================================================
# Block 6: local overlay — private files not tracked in VCS
# Deploys AFTER main blocks so local files override repo-managed ones.
# Uses filetree for flexibility (local/ is small and may contain templates).
#
# `local/host_state/` is reserved for machine-state exported from apps
# (e.g. BetterDisplay settings.plist) consumed by dedicated task files.
# It is intentionally excluded from the filetree loop below — those files
# are not dotfile-shape and must NOT be copied into the user's home.
# =============================================================================

- name: Check if local overlay directory exists
  ansible.builtin.stat:
    path: "{{ role_path }}/local"
  register: devbox_local_overlay_dir
  tags: [configs, local]

- name: Collect files from local overlay
  ansible.builtin.set_fact:
    devbox_local_filetree_items: "{{ lookup('community.general.filetree', role_path ~ '/local/', wantlist=True) }}"
  when: devbox_local_overlay_dir.stat.exists
  tags: [configs, local]

- name: Create directories from local overlay
  ansible.builtin.file:
    path: "{{ devbox_paths.dotfiles_root_dir }}/{{ item.path }}"
    state: directory
    mode: "{{ item.mode }}"
  loop: "{{ devbox_local_filetree_items | default([]) }}"
  loop_control:
    label: "{{ item.path }}"
  when:
    - devbox_local_overlay_dir.stat.exists
    - item.state == 'directory'
    - not item.path.startswith('host_state/')
    - item.path != 'host_state'
  tags: [configs, local]

- name: Copy local overlay files
  ansible.builtin.copy:
    src: "{{ role_path }}/local/{{ item.path }}"
    dest: "{{ devbox_paths.dotfiles_root_dir }}/{{ item.path }}"
    mode: "{{ item.mode | default('0644') }}"
  loop: "{{ devbox_local_filetree_items | default([]) }}"
  loop_control:
    label: "{{ item.path }}"
  when:
    - devbox_local_overlay_dir.stat.exists
    - item.state == 'file'
    - not item.path.endswith('.j2')
    - not item.path.startswith('host_state/')
  tags: [configs, local]

- name: Render local overlay templates
  ansible.builtin.template:
    src: "{{ role_path }}/local/{{ item.path }}"
    dest: "{{ devbox_paths.dotfiles_root_dir }}/{{ item.path | regex_replace('\\.j2$', '') }}"
    mode: "{{ item.mode | default('0644') }}"
  loop: "{{ devbox_local_filetree_items | default([]) }}"
  loop_control:
    label: "{{ item.path }}"
  tags: [configs, local]
  when:
    - devbox_local_overlay_dir.stat.exists
    - item.state == 'file'
    - item.path.endswith('.j2')
    - not item.path.startswith('host_state/')
