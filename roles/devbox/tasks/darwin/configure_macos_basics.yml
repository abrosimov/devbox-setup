---
# Codifies the manual steps from kabrosimov_notes/MacOS/*.md so a fresh install
# converges to the expected state via `make personal` / `make work`.

# --- Touch ID for sudo: deliberately NOT enabled -----------------------------
# pam_tid deadlocks ansible `become` (GUI dialog, no text prompt → ansible times
# out → run UNREACHABLE). Sharing a warm ticket with ansible via keepalive +
# `timestamp_type=global` + `sudo -n` was tried and failed on macOS (ticket
# invalidated within ~30s, `-n` did not suppress the GUI). So we remove pam_tid
# and let `become` use the keychain password path (ansible.cfg
# become_password_file). Cost: no interactive Touch-ID-for-sudo.
#
# The tasks below strip pam_tid/pam_reattach and the obsolete drop-in. On a
# machine that still HAS pam_tid the first `become` here would itself deadlock —
# migrate once by hand first:
#     sudo sed -i '' -E '/pam_(tid|reattach)\.so/d' /etc/pam.d/sudo_local
#     sudo rm -f /etc/sudoers.d/devbox-timestamp

- name: "Stat /etc/pam.d/sudo_local"
  ansible.builtin.stat:
    path: /etc/pam.d/sudo_local
  register: devbox_sudo_local_stat
  tags: [macos]

- name: "Check whether pam_tid / pam_reattach lines are present in sudo_local"
  ansible.builtin.command: grep -Eq '(pam_tid|pam_reattach)\.so' /etc/pam.d/sudo_local
  register: devbox_sudo_local_pam
  changed_when: false
  failed_when: false
  when: devbox_sudo_local_stat.stat.exists
  tags: [macos]

- name: "Remove Touch ID PAM module from sudo_local (pam_tid deadlocks ansible become)"
  ansible.builtin.lineinfile:
    path: /etc/pam.d/sudo_local
    regexp: '^\s*auth\s+sufficient\s+pam_tid\.so\s*$'
    state: absent
  become: true
  when:
    - devbox_sudo_local_stat.stat.exists
    - devbox_sudo_local_pam.rc | default(1) == 0
  tags: [macos]

- name: "Remove pam_reattach from sudo_local (only useful alongside pam_tid)"
  ansible.builtin.lineinfile:
    path: /etc/pam.d/sudo_local
    regexp: '^\s*auth\s+optional\s+.*/pam_reattach\.so.*$'
    state: absent
  become: true
  when:
    - devbox_sudo_local_stat.stat.exists
    - devbox_sudo_local_pam.rc | default(1) == 0
  tags: [macos]

- name: "Remove obsolete global-timestamp sudoers drop-in (from reverted fix A)"
  ansible.builtin.file:
    path: /etc/sudoers.d/devbox-timestamp
    state: absent
  become: true
  tags: [macos, sudo]

# --- Clamshell stay-awake (note: "Disable sleep when macbook is closed.md") --
# Mandatory for the 90%-clamshell-with-external-keyboard workflow.

- name: "Read current disablesleep state"
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      pmset -g custom | awk '/disablesleep/ {print $2; exit}'
    executable: /bin/bash
  register: devbox_pmset_disablesleep
  changed_when: false
  check_mode: false
  tags: [macos]

- name: "Disable sleep when lid is closed (clamshell mode stays awake)"
  ansible.builtin.command: pmset -a disablesleep 1
  when: devbox_pmset_disablesleep.stdout | trim != "1"
  become: true
  tags: [macos]

# --- Developer mode (note: "Enable Developer mode.md") -----------------------
# Removes the password prompt every time a debugger attaches to a process.

- name: "Check DevToolsSecurity status"
  ansible.builtin.command: /usr/sbin/DevToolsSecurity --status
  register: devbox_devtools_status
  changed_when: false
  check_mode: false
  failed_when: false
  tags: [macos]

- name: "Enable developer mode (debugger access without password)"
  ansible.builtin.command: /usr/sbin/DevToolsSecurity --enable
  when: '"enabled" not in (devbox_devtools_status.stdout | default(""))'
  become: true
  tags: [macos]

# HiDPI for external displays (note: "Enable HiDPI for external displays.md")
# is now handled by installing BetterDisplay via Homebrew cask — no Ansible
# step needed. BetterDisplay's config lives in ~/Library/Application Support;
# tracking it in this repo is a follow-up (see future_projects).

# --- Caps Lock delay override -----------------------------------------------
# Apple debounces the Caps Lock modifier by ~200ms to prevent accidental
# toggles. That delay breaks Caps Lock when it is remapped as a keyboard-
# layout switcher (Karabiner / built-in "Change key type"): the switch feels
# laggy and drops fast keystrokes. `hidutil property --set` with
# `CapsLockDelayOverride: 0` removes the debounce.
#
# hidutil settings do not persist across reboots or logout, so a LaunchAgent
# reapplies the override at every login (RunAtLoad). Bootstrap here also
# applies it immediately without waiting for a re-login. Applied to all HID
# keyboards (no --matching filter) — covers built-in and external.

- name: "Caps Lock delay — ensure LaunchAgents directory exists"
  ansible.builtin.file:
    path: "{{ ansible_facts['env']['HOME'] }}/Library/LaunchAgents"
    state: directory
    mode: '0755'
  tags: [macos, hidutil, launchagent]

- name: "Caps Lock delay — deploy hidutil LaunchAgent plist"
  ansible.builtin.template:
    src: darwin/Library/LaunchAgents/local.hidutil-capslock.plist.j2
    dest: "{{ ansible_facts['env']['HOME'] }}/Library/LaunchAgents/local.hidutil-capslock.plist"
    mode: '0644'
  register: devbox_hidutil_launchagent
  tags: [macos, hidutil, launchagent]

- name: "Caps Lock delay — check LaunchAgent bootstrap status"
  ansible.builtin.command:
    argv:
      - /bin/launchctl
      - print
      - "gui/{{ ansible_facts['user_uid'] }}/local.hidutil-capslock"
  register: devbox_hidutil_launchagent_status
  changed_when: false
  failed_when: false
  tags: [macos, hidutil, launchagent]

- name: "Caps Lock delay — bootout LaunchAgent (if plist changed)"
  # bootstrap fails on already-loaded services; if we redeployed the plist, we
  # must bootout first to pick up the new definition.
  ansible.builtin.command:
    argv:
      - /bin/launchctl
      - bootout
      - "gui/{{ ansible_facts['user_uid'] }}/local.hidutil-capslock"
  when:
    - devbox_hidutil_launchagent.changed
    - devbox_hidutil_launchagent_status.rc == 0
  changed_when: true
  failed_when: false
  tags: [macos, hidutil, launchagent]

- name: "Caps Lock delay — bootstrap LaunchAgent (applies override immediately)"
  ansible.builtin.command:
    argv:
      - /bin/launchctl
      - bootstrap
      - "gui/{{ ansible_facts['user_uid'] }}"
      - "{{ ansible_facts['env']['HOME'] }}/Library/LaunchAgents/local.hidutil-capslock.plist"
  when: >-
    devbox_hidutil_launchagent.changed
    or devbox_hidutil_launchagent_status.rc != 0
  changed_when: true
  tags: [macos, hidutil, launchagent]
