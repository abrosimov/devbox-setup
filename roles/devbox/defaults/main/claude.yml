---
# Managed .claude subdirectories. Each is rsynced one-way from the repo to
# ~/.claude/<dir>/ with --delete scoped to that subdir, so host-side scratch
# state under ~/.claude/ (projects/, plans/, memory/, plugins/, ...) is untouched.
# Root files (CLAUDE.md, settings.json, hooks.json, config.md) are copied separately.
# future_projects/ is intentionally absent: it is a host-only working area.
devbox_claude_managed_dirs:
  - agents
  - commands
  - skills
  - schemas
  - bin
  - docs
  - templates

# MCP servers registered via `claude mcp add` (written to ~/.claude.json under
# the `mcpServers` key, user scope). Grouped by transport type for clarity.
# The reconciler step in apply_configs.yml removes any user-scope MCP server
# not listed below, so these lists are the single source of truth.
devbox_mcp_docker_servers:
  - name: sequentialthinking
    image: mcp/sequentialthinking
    network: none
    read_only: true
  - name: playwright
    image: mcr.microsoft.com/playwright/mcp
    init: true
  - name: context7
    image: mcp/context7
    env:
      MCP_TRANSPORT: stdio

# Empty by default. memory-upstream / memory-downstream were removed
# 2026-06-20 — the file-based memory system in ~/.claude/memory/ replaces
# the graph-MCP approach.
devbox_mcp_script_servers: []

# Empty by default. figma was removed 2026-06-20 — design work goes through
# the figma plugin / web app instead. devbox_extra_mcp_http_servers (set per
# profile) still provides an extension point (e.g. atlassian on the work profile).
devbox_mcp_http_servers: []

# Claude Code plugins installed via `claude plugin` CLI.
# Marketplaces are GitHub repos containing plugin manifests.
# Plugins are installed from marketplaces by name.
devbox_claude_plugin_marketplaces:
  - repo: anthropics/skills
    name: anthropic-agent-skills
  - repo: currents-dev/playwright-best-practices-skill
    name: currents-dev-playwright

devbox_claude_plugins:
  - name: example-skills
    marketplace: anthropic-agent-skills
  - name: document-skills
    marketplace: anthropic-agent-skills
  - name: playwright-best-practices
    marketplace: currents-dev-playwright
  # LSP plugins — installed from official marketplace (pre-registered on macOS).
  # Binaries must be on PATH: gopls (go install), pyright (uv tool), typescript-language-server (npm).
  - name: gopls-lsp
  - name: pyright-lsp
  - name: typescript-lsp
